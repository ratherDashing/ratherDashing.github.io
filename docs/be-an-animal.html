    groundHeight: 90, speed: 5.2, jumpPower: 13,
    hint: 'Swift Triassic hunter. Action snaps needle teeth and reaches.',
    food: 'cynodont', drawFood: drawCynodont,
    spawnY: () => H - 100,
    itemSpeed: () => -3.5 - Math.random() * 1.8
  },
  ceratosaurus: {
    name: 'Ceratosaurus', draw: drawCeratosaurus,
    bgSky: '#a8a868', bgSky2: '#6a6438',
    bgGround: '#4a3a28',
    groundHeight: 92, speed: 3, jumpPower: 8,
    hint: 'Horn-headed predator. Action lunges with the nasal horn.',
    food: 'crocodylomorph', drawFood: drawCrocodylomorph,
    spawnY: () => H - 100,
    itemSpeed: () => -2.4 - Math.random() * 1.4
  },
  carnotaurus: {
    name: 'Carnotaurus', draw: drawCarnotaurus,
    bgSky: '#d8784a', bgSky2: '#7a3818',
    bgGround: '#6a3820',
    groundHeight: 90, speed: 4.6, jumpPower: 10,
    hint: 'Bull-horned sprinter. Action shakes the head with the horns.',
    food: 'baby_titan', drawFood: drawBabyTitanosaur,
    spawnY: () => H - 100,
    itemSpeed: () => -3.0 - Math.random() * 1.6
  }
};

// ---------- GAME STATE ----------

let state = 'menu';
let animal = null, animalKey = null;
let score = 0;
const player = {
  x: 0, y: 0, vx: 0, vy: 0, facing: 1,
  actionTimer: 0, onGround: true, catchRadius: 40
};
let items = [];
let particles = [];
let clouds = [];
let stars = [];
let time = 0;
const keys = {};

function initClouds() {
  clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: Math.random() * W, y: 30 + Math.random() * 100,
      size: 30 + Math.random() * 40, speed: 0.2 + Math.random() * 0.3
    });
  }
}

function initStars() {
  stars = [];
  for (let i = 0; i < 30; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H * 0.6,
      size: 1 + Math.random() * 2
    });
  }
}

// ---------- INPUT ----------

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (k === 'arrowleft' || k === 'a') keys['left'] = true;
  if (k === 'arrowright' || k === 'd') keys['right'] = true;
  if (k === 'arrowup' || k === 'w' || k === ' ') { keys['up'] = true; e.preventDefault(); }
  if (k === 'arrowdown' || k === 's') keys['down'] = true;
  if (k === 'x' || k === 'z' || k === 'enter') keys['action'] = true;
});
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  keys[k] = false;
  if (k === 'arrowleft' || k === 'a') keys['left'] = false;
  if (k === 'arrowright' || k === 'd') keys['right'] = false;
  if (k === 'arrowup' || k === 'w' || k === ' ') keys['up'] = false;
  if (k === 'arrowdown' || k === 's') keys['down'] = false;
  if (k === 'x' || k === 'z' || k === 'enter') keys['action'] = false;
});

document.querySelectorAll('.ctrl').forEach(el => {
  const k = el.dataset.key;
  const on = e => { e.preventDefault(); keys[k] = true; };
  const off = e => { e.preventDefault(); keys[k] = false; };
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('mousedown', on);
  el.addEventListener('touchend', off);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
  el.addEventListener('touchcancel', off);
});

document.getElementById('menuBtn').addEventListener('click', () => backToMenu());

// ---------- GAME FLOW ----------

function startGame(key) {
  animalKey = key;
  animal = ANIMALS[key];
  score = 0;
  items = [];
  particles = [];
  player.x = W * 0.28;
  player.y = animal.canSwim ? H * 0.5 : H - animal.groundHeight - 30;
  player.vx = 0; player.vy = 0;
  player.facing = 1;
  player.actionTimer = 0;
  player.onGround = true;
  player.catchRadius = animalScale(animal) * 45;
  initClouds(); initStars();
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('score').textContent = 'Score: 0';
  document.getElementById('hint').textContent = animal.hint;
  const diveBtn = document.getElementById('diveBtn');
  if (animal.canSwim) diveBtn.classList.remove('hidden');
  else diveBtn.classList.add('hidden');
  state = 'play';
}

function backToMenu() {
  state = 'menu';
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');
}

function animalScale(a) {
  const base = Math.min(W, H) / 700;
  const map = { frog: 1.1, snake: 1, turtle: 1, whale: 1.1, elephant: 1, giraffe: 1, velociraptor: 1, trex: 1.15, stegosaurus: 1.1, spinosaurus: 1.15, allosaurus: 1.1, mosasaurus: 1.15, elasmosaurus: 1, diplodocus: 1.2, coelophysis: 0.95, ceratosaurus: 1.1, carnotaurus: 1.1 };
  return Math.max(0.7, Math.min(1.4, base)) * (map[Object.keys(ANIMALS).find(k => ANIMALS[k] === a)] || 1);
}

// ---------- UPDATE ----------

function spawnItem() {
  const speed = animal.itemSpeed();
  items.push({
    x: W + 30,
    y: animal.spawnY(),
    vx: speed,
    vy: animal.spawnVY ? animal.spawnVY() : 0,
    color: '#ffaa33',
    type: animal.food,
    draw: animal.drawFood,
    life: 600
  });
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2,
      life: 30 + Math.random() * 15,
      color: color || '#ffe888',
      size: 2 + Math.random() * 3
    });
  }
}

let spawnCooldown = 0;

function update() {
  time++;

  // Input
  let ix = 0;
  if (keys['left']) ix = -1;
  if (keys['right']) ix = 1;
  const jump = keys['up'];
  const down = keys['down'];
  const actionPress = keys['action'];

  const scl = animalScale(animal);

  if (animal.canSwim) {
    let iy = 0;
    if (jump) iy = -1;
    if (down) iy = 1;
    player.vx += ix * 0.6;
    player.vy += iy * 0.6;
    player.vx *= 0.9; player.vy *= 0.9;
    const maxV = animal.speed;
    const vmag = Math.hypot(player.vx, player.vy);
    if (vmag > maxV) { player.vx = player.vx / vmag * maxV; player.vy = player.vy / vmag * maxV; }
    player.x += player.vx; player.y += player.vy;
    player.y = Math.max(60, Math.min(H - 40, player.y));
  } else {
    player.vx = ix * animal.speed;
    if (jump && player.onGround && animal.jumpPower > 0) {
      player.vy = -animal.jumpPower;
      player.onGround = false;
    }
    if (!player.onGround) player.vy += 0.55;
    player.x += player.vx; player.y += player.vy;
    const groundY = H - animal.groundHeight - 30 * scl;
    if (player.y >= groundY) {
      player.y = groundY; player.vy = 0; player.onGround = true;
    }
  }

  player.x = Math.max(60, Math.min(W - 60, player.x));
  if (ix !== 0) player.facing = ix;

  // Action
  if (actionPress && player.actionTimer <= 0) {
    player.actionTimer = 28;
  }
  if (player.actionTimer > 0) player.actionTimer--;
  const actionLevel = player.actionTimer > 0 ? Math.min(1, player.actionTimer / 15) : 0;

  // Spawn items
  spawnCooldown--;
  if (spawnCooldown <= 0) {
    spawnItem();
    spawnCooldown = 45 + Math.random() * 60;
  }

  // Update items
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.x += it.vx;
    it.y += it.vy;
    if (it.vy !== 0 && !animal.underwater) {
      // For falling items (elephant fruit), land on ground
      const gy = H - animal.groundHeight - 8;
      if (it.y >= gy) { it.y = gy; it.vy = 0; }
    }
    it.life--;

    // Collision
    const effRadius = player.catchRadius + (actionLevel * 45);
    const px = player.x + player.facing * (actionLevel * 30);
    const py = player.y - (animalKey === 'frog' ? actionLevel * 20 : 0)
                       - (animalKey === 'elephant' ? actionLevel * 30 : 0);
    const dx = it.x - px, dy = it.y - py;
    if (Math.hypot(dx, dy) < effRadius) {
      score++;
      document.getElementById('score').textContent = 'Score: ' + score;
      spawnParticles(it.x, it.y, '#ffe888');
      items.splice(i, 1);
      continue;
    }

    if (it.x < -60 || it.life <= 0) items.splice(i, 1);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2; p.vx *= 0.98;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Clouds
  clouds.forEach(cl => {
    cl.x -= cl.speed;
    if (cl.x < -100) { cl.x = W + 50; cl.y = 30 + Math.random() * 100; }
  });
}

// ---------- RENDER ----------

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, animal.bgSky);
  grad.addColorStop(1, animal.bgSky2 || animal.bgSky);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Sky elements
  if (animal.underwater) {
    // Light shafts
    ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
    for (let i = 0; i < 6; i++) {
      ctx.save();
      ctx.translate(i * W / 6 + Math.sin(time * 0.003 + i) * 40, 0);
      ctx.rotate(-0.1);
      ctx.fillRect(0, 0, 40, H);
      ctx.restore();
    }
    // Bubbles
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    for (let i = 0; i < 25; i++) {
      const bx = (i * 73 + time * 0.3) % W;
      const by = (H - (time * 0.8 + i * 137) % H);
      ctx.beginPath();
      ctx.arc(bx, by, 2 + (i % 3), 0, Math.PI*2);
      ctx.fill();
    }
  } else if (animalKey === 'trex') {
    // Dark stars / embers
    ctx.fillStyle = 'rgba(255, 180, 80, 0.8)';
    for (let i = 0; i < 8; i++) {
      const bx = (i * 83 + time * 0.2) % W;
      const by = (100 + i * 40 + Math.sin(time * 0.02 + i) * 30) % (H * 0.6);
      ctx.beginPath();
      ctx.arc(bx, by, 2, 0, Math.PI*2);
      ctx.fill();
    }
  } else {
    // Sun
    ctx.fillStyle = 'rgba(255, 240, 200, 0.5)';
    ctx.beginPath(); ctx.arc(W - 80, 80, 45, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255, 250, 220, 0.9)';
    ctx.beginPath(); ctx.arc(W - 80, 80, 32, 0, Math.PI*2); ctx.fill();

    // Clouds
    ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
    clouds.forEach(cl => {
      ctx.beginPath();
      ctx.arc(cl.x, cl.y, cl.size * 0.6, 0, Math.PI*2);
      ctx.arc(cl.x + cl.size * 0.5, cl.y - cl.size * 0.1, cl.size * 0.55, 0, Math.PI*2);
      ctx.arc(cl.x + cl.size, cl.y, cl.size * 0.5, 0, Math.PI*2);
      ctx.arc(cl.x + cl.size * 0.3, cl.y + cl.size * 0.2, cl.size * 0.45, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Environment (backdrops)
  drawEnvironment();

  // Ground
  if (!animal.canSwim) {
    ctx.fillStyle = animal.bgGround;
    ctx.fillRect(0, H - animal.groundHeight, W, animal.groundHeight);
    // Ground texture
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
    for (let i = 0; i < 40; i++) {
      const gx = (i * 47 + time * 0.3) % W;
      const gy = H - animal.groundHeight + (i * 13) % animal.groundHeight;
      ctx.fillRect(gx, gy, 3, 2);
    }
  } else {
    // Seabed
    ctx.fillStyle = animal.bgGround;
    ctx.fillRect(0, H - animal.groundHeight, W, animal.groundHeight);
    // Seaweed on bottom
    ctx.strokeStyle = 'rgba(40, 120, 60, 0.7)'; ctx.lineWidth = 3;
    for (let i = 0; i < 8; i++) {
      const sx = (i * 150 + time * 0.4) % (W + 100) - 50;
      ctx.beginPath();
      ctx.moveTo(sx, H - animal.groundHeight);
      for (let j = 0; j < 6; j++) {
        ctx.lineTo(sx + Math.sin(time * 0.05 + j + i) * 8, H - animal.groundHeight - j * 10 - 5);
      }
      ctx.stroke();
    }
  }
}

function drawEnvironment() {
  switch (animalKey) {
    case 'frog': {
      // Distant hills
      ctx.fillStyle = 'rgba(50, 110, 70, 0.5)';
      ctx.beginPath();
      ctx.moveTo(0, H - animal.groundHeight);
      for (let i = 0; i <= W; i += 20) {
        ctx.lineTo(i, H - animal.groundHeight - 30 - Math.sin(i * 0.01) * 25);
      }
      ctx.lineTo(W, H - animal.groundHeight); ctx.closePath(); ctx.fill();
      // Lily pads
      ctx.fillStyle = '#2a6a2a';
      for (let i = 0; i < 4; i++) {
        const px = ((i * 250 + time * 0.5) % (W + 200)) - 100;
        ctx.beginPath();
        ctx.ellipse(px, H - 25, 30, 8, 0, 0, Math.PI*2); ctx.fill();
      }
      // Reeds
      ctx.strokeStyle = '#3a6a2a'; ctx.lineWidth = 2.5;
      for (let i = 0; i < 12; i++) {
        const rx = ((i * 120 + time * 0.8) % (W + 100)) - 50;
        ctx.beginPath();
        ctx.moveTo(rx, H - animal.groundHeight + 20);
        ctx.quadraticCurveTo(rx + Math.sin(time * 0.04 + i) * 3, H - animal.groundHeight - 15, rx + 2, H - animal.groundHeight - 45);
        ctx.stroke();
      }
      break;
    }
    case 'snake': {
      // Desert dunes
      ctx.fillStyle = 'rgba(180, 130, 70, 0.4)';
      ctx.beginPath();
      ctx.moveTo(0, H - animal.groundHeight);
      for (let i = 0; i <= W; i += 10) {
        ctx.lineTo(i, H - animal.groundHeight - 20 - Math.sin(i * 0.008) * 18);
      }
      ctx.lineTo(W, H - animal.groundHeight); ctx.closePath(); ctx.fill();
      // Cacti
      ctx.fillStyle = '#3a6a38';
      for (let i = 0; i < 3; i++) {
        const cx = ((i * 380 + time * 0.6) % (W + 200)) - 100;
        const cy = H - animal.groundHeight;
        ctx.fillRect(cx, cy - 55, 12, 55);
        ctx.fillRect(cx - 8, cy - 35, 8, 15);
        ctx.fillRect(cx + 12, cy - 40, 8, 18);
        // Spines
        ctx.strokeStyle = '#2a5a28'; ctx.lineWidth = 1;
        for (let j = 0; j < 6; j++) {
          ctx.beginPath();
          ctx.moveTo(cx, cy - 50 + j * 8); ctx.lineTo(cx + 13, cy - 50 + j * 8);
          ctx.stroke();
        }
      }
      break;
    }
    case 'turtle': {
      // Water surface (above)
      ctx.fillStyle = 'rgba(180, 220, 240, 0.3)';
      ctx.fillRect(0, 0, W, 40);
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i < W; i += 5) {
        const y = 38 + Math.sin(i * 0.05 + time * 0.05) * 3;
        if (i === 0) ctx.moveTo(i, y); else ctx.lineTo(i, y);
      }
      ctx.stroke();
      // Coral
      ctx.fillStyle = '#ff7755';
      for (let i = 0; i < 4; i++) {
        const cx = ((i * 280 + time * 0.4) % (W + 150)) - 75;
        const cy = H - animal.groundHeight;
        ctx.beginPath();
        ctx.moveTo(cx, cy); ctx.lineTo(cx - 8, cy - 30); ctx.lineTo(cx - 4, cy - 32);
        ctx.lineTo(cx, cy - 25); ctx.lineTo(cx + 4, cy - 32); ctx.lineTo(cx + 8, cy - 30);
        ctx.closePath(); ctx.fill();
      }
      break;
    }
    case 'whale': {
      // Deep water darkening
      const dg = ctx.createLinearGradient(0, 0, 0, H);
      dg.addColorStop(0, 'rgba(0,0,0,0)');
      dg.addColorStop(1, 'rgba(0,0,0,0.4)');
      ctx.fillStyle = dg;
      ctx.fillRect(0, 0, W, H);
      break;
    }
    case 'elephant': {
      // Acacia silhouettes
      ctx.fillStyle = 'rgba(60, 40, 20, 0.5)';
      for (let i = 0; i < 3; i++) {
        const tx = ((i * 420 + time * 0.3) % (W + 300)) - 150;
        const ty = H - animal.groundHeight;
        ctx.fillRect(tx, ty - 80, 5, 80);
        ctx.beginPath();
        ctx.ellipse(tx + 2, ty - 85, 35, 15, 0, 0, Math.PI*2); ctx.fill();
      }
      // Grass tufts
      ctx.strokeStyle = '#7a6428'; ctx.lineWidth = 2;
      for (let i = 0; i < 15; i++) {
        const gx = ((i * 110 + time * 0.5) % (W + 80)) - 40;
        ctx.beginPath();
        ctx.moveTo(gx, H - animal.groundHeight + 5);
        ctx.lineTo(gx + 2, H - animal.groundHeight - 8);
        ctx.stroke();
      }
      break;
    }
    case 'giraffe': {
      // Tall acacia trees
      ctx.fillStyle = 'rgba(80, 50, 25, 0.7)';
      for (let i = 0; i < 4; i++) {
        const tx = ((i * 280 + time * 0.4) % (W + 200)) - 100;
        const ty = H - animal.groundHeight;
        ctx.fillRect(tx, ty - 130, 6, 130);
      }
      ctx.fillStyle = 'rgba(50, 100, 50, 0.85)';
      for (let i = 0; i < 4; i++) {
        const tx = ((i * 280 + time * 0.4) % (W + 200)) - 100;
        const ty = H - animal.groundHeight;
        ctx.beginPath();
        ctx.ellipse(tx + 3, ty - 135, 45, 18, 0, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'velociraptor': {
      // Jungle foliage
      ctx.fillStyle = 'rgba(40, 70, 30, 0.6)';
      for (let i = 0; i < 6; i++) {
        const fx = ((i * 200 + time * 0.5) % (W + 150)) - 75;
        const fy = H - animal.groundHeight;
        ctx.beginPath();
        ctx.ellipse(fx, fy - 40, 60, 30, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath();
        ctx.ellipse(fx + 30, fy - 20, 50, 25, 0, 0, Math.PI*2); ctx.fill();
      }
      // Vines
      ctx.strokeStyle = 'rgba(30, 60, 25, 0.5)'; ctx.lineWidth = 2;
      for (let i = 0; i < 6; i++) {
        const vx = (i * 180 + time * 0.2) % W;
        ctx.beginPath();
        ctx.moveTo(vx, 0);
        for (let j = 0; j < 8; j++) {
          ctx.lineTo(vx + Math.sin(time * 0.02 + j + i) * 6, j * 30);
        }
        ctx.stroke();
      }
      break;
    }
    case 'trex': {
      // Volcano
      ctx.fillStyle = '#3a1a18';
      ctx.beginPath();
      ctx.moveTo(W * 0.6, H - animal.groundHeight);
      ctx.lineTo(W * 0.75, H - animal.groundHeight - 200);
      ctx.lineTo(W * 0.9, H - animal.groundHeight);
      ctx.closePath(); ctx.fill();
      // Lava
      ctx.fillStyle = '#ff5522';
      ctx.beginPath();
      ctx.moveTo(W * 0.72, H - animal.groundHeight - 185);
      ctx.lineTo(W * 0.78, H - animal.groundHeight - 185);
      ctx.lineTo(W * 0.75, H - animal.groundHeight - 200);
      ctx.closePath(); ctx.fill();
      // Smoke
      ctx.fillStyle = 'rgba(80, 40, 30, 0.5)';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(W * 0.75 + Math.sin(time * 0.02 + i) * 10, H - animal.groundHeight - 220 - i * 25, 18 + i * 4, 0, Math.PI*2);
        ctx.fill();
      }
      // Dead trees
      ctx.strokeStyle = '#2a1810'; ctx.lineWidth = 3;
      for (let i = 0; i < 4; i++) {
        const tx = ((i * 320 + time * 0.4) % (W + 200)) - 100;
        const ty = H - animal.groundHeight;
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx + 2, ty - 70); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx + 1, ty - 40); ctx.lineTo(tx - 10, ty - 55); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx + 2, ty - 50); ctx.lineTo(tx + 12, ty - 65); ctx.stroke();
      }
      break;
    }
    case 'stegosaurus': {
      // Distant Jurassic hills
      ctx.fillStyle = 'rgba(90, 130, 70, 0.55)';
      ctx.beginPath();
      ctx.moveTo(0, H - animal.groundHeight);
      for (let i = 0; i <= W; i += 18) {
        ctx.lineTo(i, H - animal.groundHeight - 50 - Math.sin(i * 0.006) * 30);
      }
      ctx.lineTo(W, H - animal.groundHeight); ctx.closePath(); ctx.fill();
      // Ginkgo / conifer trees
      for (let i = 0; i < 5; i++) {
        const tx = ((i * 260 + time * 0.35) % (W + 200)) - 100;
        const ty = H - animal.groundHeight;
        ctx.fillStyle = '#3a281a';
        ctx.fillRect(tx, ty - 90, 6, 90);
        ctx.fillStyle = '#4a7a38';
        for (let j = 0; j < 4; j++) {
          ctx.beginPath();
          ctx.moveTo(tx - 22 + j * 2, ty - 40 - j * 15);
          ctx.lineTo(tx + 3, ty - 70 - j * 15);
          ctx.lineTo(tx + 28 - j * 2, ty - 40 - j * 15);
          ctx.closePath(); ctx.fill();
        }
      }
      // Cycad fronds on ground
      ctx.strokeStyle = '#2a5a28'; ctx.lineWidth = 2.5;
      for (let i = 0; i < 10; i++) {
        const fx = ((i * 140 + time * 0.6) % (W + 100)) - 50;
        const fy = H - animal.groundHeight;
        for (let j = -2; j <= 2; j++) {
          ctx.beginPath();
          ctx.moveTo(fx, fy);
          ctx.quadraticCurveTo(fx + j * 12, fy - 18, fx + j * 20, fy - 28);
          ctx.stroke();
        }
      }
      // Prehistoric flowers / horsetails
      ctx.fillStyle = '#d8d8a0';
      for (let i = 0; i < 8; i++) {
        const hx = ((i * 170 + time * 0.5) % (W + 80)) - 40;
        ctx.beginPath();
        ctx.arc(hx, H - animal.groundHeight - 5, 3, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case 'spinosaurus': {
      // Distant mangrove silhouettes

        { x: W * 0.18, y: H - animal.groundHeight - 12, sc: 0.4 },
        { x: W * 0.42, y: H - animal.groundHeight - 14, sc: 0.5 },
        { x: W * 0.88, y: H - animal.groundHeight - 11, sc: 0.45 }
      ];
      pack.forEach((p, idx) => {
        const run = Math.sin(time * 0.15 + idx) * 2;
        const cx = p.x, cy = p.y, sc = p.sc;
        // Body
        ctx.beginPath();
        ctx.ellipse(cx, cy, 18 * sc, 7 * sc, -0.1, 0, Math.PI*2); ctx.fill();
        // Tail
        ctx.beginPath();
        ctx.moveTo(cx - 14 * sc, cy);
        ctx.quadraticCurveTo(cx - 30 * sc, cy - 6 * sc + run, cx - 44 * sc, cy + run);
        ctx.lineTo(cx - 44 * sc, cy + 2 * sc + run);
        ctx.quadraticCurveTo(cx - 30 * sc, cy - 2 * sc + run, cx - 14 * sc, cy + 4 * sc);
        ctx.closePath(); ctx.fill();
        // Neck and head
        ctx.beginPath();
        ctx.moveTo(cx + 12 * sc, cy - 2 * sc);
        ctx.bezierCurveTo(cx + 18 * sc, cy - 12 * sc, cx + 22 * sc, cy - 18 * sc, cx + 28 * sc, cy - 18 * sc);
        ctx.lineTo(cx + 32 * sc, cy - 16 * sc);
        ctx.bezierCurveTo(cx + 22 * sc, cy - 14 * sc, cx + 18 * sc, cy - 8 * sc, cx + 14 * sc, cy);
        ctx.closePath(); ctx.fill();
        // Head
        ctx.beginPath();
        ctx.ellipse(cx + 30 * sc, cy - 17 * sc, 5 * sc, 2.5 * sc, 0, 0, Math.PI*2); ctx.fill();
        // Legs (running)
        ctx.fillRect(cx - 4 * sc + run, cy + 5 * sc, 1.5 * sc, 14 * sc);
        ctx.fillRect(cx + 4 * sc - run, cy + 5 * sc, 1.5 * sc, 14 * sc);
      });
      // Sparse Triassic conifers (tall and lean)
      for (let i = 0; i < 4; i++) {
        const tx = ((i * 320 + time * 0.4) % (W + 200)) - 100;
        const ty = H - animal.groundHeight;
        ctx.fillStyle = '#3a2010';
        ctx.fillRect(tx, ty - 90, 4, 90);
        ctx.fillStyle = '#5a6a30';
        for (let j = 0; j < 3; j++) {
          ctx.beginPath();
          ctx.moveTo(tx - 14 + j * 1, ty - 40 - j * 16);
          ctx.lineTo(tx + 2, ty - 60 - j * 16);
          ctx.lineTo(tx + 18 - j * 1, ty - 40 - j * 16);
          ctx.closePath(); ctx.fill();
        }
      }
      // Skeletal remains scattered (Coelophysis fossil bonebed reference)
      ctx.fillStyle = 'rgba(220, 200, 170, 0.65)';
      for (let i = 0; i < 6; i++) {
        const bx = ((i * 230 + time * 0.5) % (W + 100)) - 50;
        const by = H - animal.groundHeight + 22;
        // Rib bones
        for (let j = 0; j < 4; j++) {
          ctx.beginPath();
          ctx.ellipse(bx + j * 6, by, 1.5, 4, 0, 0, Math.PI*2); ctx.fill();
        }
        // Spine
        ctx.fillRect(bx, by - 1, 24, 1.5);
      }
      // Cracked dry earth
      ctx.strokeStyle = 'rgba(80, 30, 15, 0.55)'; ctx.lineWidth = 1.5;
      for (let i = 0; i < 12; i++) {
        const cx = ((i * 130 + time * 0.6) % (W + 80)) - 40;
        const cy = H - animal.groundHeight + 18;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + 10, cy + 4); ctx.lineTo(cx + 18, cy + 1); ctx.lineTo(cx + 26, cy + 5);
        ctx.stroke();
      }
      // Dust kicked up (faster animal, more dust)
      ctx.fillStyle = 'rgba(200, 140, 90, 0.35)';
      for (let i = 0; i < 12; i++) {
        const dx = ((i * 60 + time * 1.2) % (W + 40)) - 20;
        const dy = H - animal.groundHeight - 5 + Math.sin(time * 0.1 + i) * 4;
        ctx.beginPath();
        ctx.arc(dx, dy, 2 + Math.sin(time * 0.05 + i), 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'ceratosaurus': {
      // Distant cliffs (sandstone reds and tans)
      ctx.fillStyle = 'rgba(120, 90, 60, 0.6)';
      ctx.beginPath();
      ctx.moveTo(0, H - animal.groundHeight);
      for (let i = 0; i <= W; i += 24) {
        ctx.lineTo(i, H - animal.groundHeight - 60 - Math.sin(i * 0.007) * 30);
      }
      ctx.lineTo(W, H - animal.groundHeight); ctx.closePath(); ctx.fill();
      // River across the midground
      const riverY = H - animal.groundHeight + 20;
      ctx.fillStyle = 'rgba(80, 110, 130, 0.55)';
      ctx.fillRect(0, riverY - 8, W, 12);
      // River reflections / ripples
      ctx.strokeStyle = 'rgba(220, 230, 240, 0.4)'; ctx.lineWidth = 1.2;
      for (let i = 0; i < 12; i++) {
        const rx = ((i * 130 + time * 0.7) % (W + 60)) - 30;
        ctx.beginPath();
        ctx.moveTo(rx, riverY - 4);
        ctx.quadraticCurveTo(rx + 10, riverY - 6, rx + 20, riverY - 4);
        ctx.stroke();
      }
      // Reeds along riverbank
      ctx.strokeStyle = '#3a5028'; ctx.lineWidth = 2;
      for (let i = 0; i < 14; i++) {
        const rx = ((i * 90 + time * 0.6) % (W + 60)) - 30;
        ctx.beginPath();
        ctx.moveTo(rx, riverY - 4);
        ctx.quadraticCurveTo(rx + Math.sin(time * 0.04 + i) * 3, riverY - 22, rx + 1, riverY - 38);
        ctx.stroke();
      }
      // Tree ferns
      for (let i = 0; i < 5; i++) {
        const tx = ((i * 280 + time * 0.45) % (W + 200)) - 100;
        const ty = H - animal.groundHeight;
        ctx.fillStyle = '#3a2818';
        ctx.fillRect(tx - 1, ty - 50, 3, 50);
        ctx.strokeStyle = '#3a6a30'; ctx.lineWidth = 2.5;
        for (let j = -3; j <= 3; j++) {
          ctx.beginPath();
          ctx.moveTo(tx, ty - 50);
          ctx.quadraticCurveTo(tx + j * 8, ty - 60, tx + j * 18, ty - 56);
          ctx.stroke();
        }
      }
      // A small distant Stegosaurus silhouette (Morrison fauna companion)
      const stx = W * 0.7;
      const sty = H - animal.groundHeight - 8;
      ctx.fillStyle = 'rgba(60, 50, 30, 0.55)';
      ctx.beginPath();
      ctx.ellipse(stx, sty, 22, 8, 0, 0, Math.PI*2); ctx.fill();
      // Plates
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(stx - 14 + i * 6, sty - 6);
        ctx.lineTo(stx - 12 + i * 6, sty - 14);
        ctx.lineTo(stx - 10 + i * 6, sty - 6);
        ctx.closePath(); ctx.fill();
      }
      // Legs
      ctx.fillRect(stx - 12, sty + 4, 3, 8);
      ctx.fillRect(stx - 4, sty + 4, 3, 8);
      ctx.fillRect(stx + 6, sty + 4, 3, 8);
      ctx.fillRect(stx + 14, sty + 4, 3, 8);
      // Small head
      ctx.beginPath();
      ctx.ellipse(stx + 22, sty + 2, 4, 3, 0, 0, Math.PI*2); ctx.fill();
      // Mossy ground patches
      ctx.fillStyle = 'rgba(70, 90, 50, 0.6)';
      for (let i = 0; i < 10; i++) {
        const mx = ((i * 150 + time * 0.55) % (W + 80)) - 40;
        const my = H - animal.groundHeight + 18;
        ctx.beginPath();
        ctx.ellipse(mx, my, 12, 2.5, 0, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'carnotaurus': {
      // Distant Patagonian volcano
      ctx.fillStyle = 'rgba(80, 50, 40, 0.7)';
      const vx = W * 0.78;
      ctx.beginPath();
      ctx.moveTo(vx - 90, H - animal.groundHeight);
      ctx.lineTo(vx - 25, H - animal.groundHeight - 110);
      ctx.lineTo(vx - 10, H - animal.groundHeight - 105);
      ctx.lineTo(vx + 10, H - animal.groundHeight - 115);
      ctx.lineTo(vx + 25, H - animal.groundHeight - 100);
      ctx.lineTo(vx + 90, H - animal.groundHeight);
      ctx.closePath(); ctx.fill();
      // Volcano smoke
      ctx.fillStyle = 'rgba(80, 60, 50, 0.5)';
      for (let i = 0; i < 5; i++) {
        const px = vx + Math.sin(time * 0.02 + i) * 8;
        const py = H - animal.groundHeight - 120 - i * 22;
        ctx.beginPath();
        ctx.arc(px, py, 14 + i * 4, 0, Math.PI*2); ctx.fill();
      }
      // Other Patagonian hills
      ctx.fillStyle = 'rgba(110, 70, 50, 0.6)';
      ctx.beginPath();
      ctx.moveTo(0, H - animal.groundHeight);
      for (let i = 0; i <= W * 0.6; i += 22) {
        ctx.lineTo(i, H - animal.groundHeight - 50 - Math.sin(i * 0.008) * 22);
      }
      ctx.lineTo(W * 0.6, H - animal.groundHeight); ctx.closePath(); ctx.fill();
      // Distant titanosaur herd (parent and babies)
      ctx.fillStyle = 'rgba(70, 50, 35, 0.55)';
      const titans = [
        { x: W * 0.18, sc: 0.85, isBaby: false },
        { x: W * 0.3, sc: 0.35, isBaby: true },
        { x: W * 0.46, sc: 0.4, isBaby: true }
      ];
      titans.forEach(t2 => {
        const cx = t2.x + Math.sin(time * 0.01 + t2.x * 0.01) * 3;
        const cy = H - animal.groundHeight - (t2.isBaby ? 12 : 30);
        const sc = t2.sc;
        // Body
        ctx.beginPath();
        ctx.ellipse(cx, cy, 28 * sc, 11 * sc, 0, 0, Math.PI*2); ctx.fill();
        // Long neck
        ctx.beginPath();
        ctx.moveTo(cx + 22 * sc, cy - 2 * sc);
        ctx.bezierCurveTo(cx + 45 * sc, cy - 30 * sc, cx + 60 * sc, cy - 50 * sc, cx + 70 * sc, cy - 65 * sc);
        ctx.lineTo(cx + 73 * sc, cy - 63 * sc);
        ctx.bezierCurveTo(cx + 63 * sc, cy - 48 * sc, cx + 48 * sc, cy - 28 * sc, cx + 25 * sc, cy);
        ctx.closePath(); ctx.fill();
        // Head
        ctx.beginPath();
        ctx.ellipse(cx + 73 * sc, cy - 65 * sc, 5 * sc, 3 * sc, 0, 0, Math.PI*2); ctx.fill();
        // Tail
        ctx.beginPath();
        ctx.moveTo(cx - 22 * sc, cy);
        ctx.quadraticCurveTo(cx - 50 * sc, cy - 4 * sc, cx - 75 * sc, cy + 4 * sc);
        ctx.lineTo(cx - 75 * sc, cy + 6 * sc);
        ctx.quadraticCurveTo(cx - 50 * sc, cy, cx - 22 * sc, cy + 3 * sc);
        ctx.closePath(); ctx.fill();
        // Legs
        ctx.fillRect(cx - 16 * sc, cy + 8 * sc, 4 * sc, 22 * sc);
        ctx.fillRect(cx - 4 * sc, cy + 8 * sc, 4 * sc, 22 * sc);
        ctx.fillRect(cx + 8 * sc, cy + 8 * sc, 4 * sc, 22 * sc);
        ctx.fillRect(cx + 18 * sc, cy + 8 * sc, 4 * sc, 22 * sc);
      });
      // Araucaria trees (Patagonian conifers)
      for (let i = 0; i < 4; i++) {
        const tx = ((i * 320 + time * 0.4) % (W + 200)) - 100;
        const ty = H - animal.groundHeight;
        ctx.fillStyle = '#3a2010';
        ctx.fillRect(tx, ty - 100, 5, 100);
        // Wide flat-topped Araucaria crown
        ctx.fillStyle = '#3a5828';
        ctx.beginPath();
        ctx.ellipse(tx + 2, ty - 102, 22, 8, 0, 0, Math.PI*2); ctx.fill();
        // Spiky branch tufts
        for (let j = 0; j < 5; j++) {
          ctx.beginPath();
          ctx.arc(tx - 14 + j * 7, ty - 100, 4, 0, Math.PI*2); ctx.fill();
        }
      }
      // Low scrub grass tufts (Patagonian steppe)
      ctx.fillStyle = '#7a6038';
      for (let i = 0; i < 16; i++) {
        const gx = ((i * 100 + time * 0.5) % (W + 80)) - 40;
        const gy = H - animal.groundHeight + 14;
        ctx.beginPath();
        ctx.ellipse(gx, gy, 6, 2, 0, 0, Math.PI*2); ctx.fill();
        // Tufts of grass blades
        ctx.strokeStyle = '#9a7a48'; ctx.lineWidth = 1;
        for (let j = -2; j <= 2; j++) {
          ctx.beginPath();
          ctx.moveTo(gx + j * 1.5, gy - 1);
          ctx.lineTo(gx + j * 1.5, gy - 6);
          ctx.stroke();
        }
      }
      // Heat shimmer / dust haze
      ctx.fillStyle = 'rgba(220, 150, 100, 0.18)';
      for (let i = 0; i < 8; i++) {
        const sx = ((i * 100 + time * 0.8) % (W + 60)) - 30;
        const sy = H - animal.groundHeight - 8 + Math.sin(time * 0.06 + i) * 3;
        ctx.beginPath();
        ctx.ellipse(sx, sy, 30, 4, 0, 0, Math.PI*2); ctx.fill();
      }
      break;
    }
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  const scl = animalScale(animal);
  const actionLevel = player.actionTimer > 0 ? Math.min(1, player.actionTimer / 15) : 0;

  // Draw items behind player if further
  items.forEach(it => it.draw(ctx, it, time));

  // Draw player
  animal.draw(ctx, player.x, player.y, scl, player.facing, actionLevel, time);

  // Action radius visual
  if (actionLevel > 0.3) {
    ctx.strokeStyle = `rgba(255, 255, 180, ${actionLevel * 0.4})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x + player.facing * actionLevel * 30,
            player.y - (animalKey === 'frog' ? actionLevel * 20 :
                        animalKey === 'elephant' ? actionLevel * 30 : 0),
            player.catchRadius + actionLevel * 45, 0, Math.PI*2);
    ctx.stroke();
  }

  // Particles
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 45;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ---------- LOOP ----------

function loop() {
  if (state === 'play') {
    update();
    render();
  }
  requestAnimationFrame(loop);
}
loop();

// ---------- MENU ----------

function buildMenu() {
  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  Object.keys(ANIMALS).forEach(key => {
    const a = ANIMALS[key];
    const card = document.createElement('div');
    card.className = 'card';
    const cv = document.createElement('canvas');
    cv.width = 180; cv.height = 100;
    const label = document.createElement('span');
    label.textContent = a.name;
    card.appendChild(cv);
    card.appendChild(label);
    cards.appendChild(card);

    const cc = cv.getContext('2d');
    cc.clearRect(0, 0, 180, 100);
    // Mini scene bg
    const g = cc.createLinearGradient(0, 0, 0, 100);
    g.addColorStop(0, a.bgSky);
    g.addColorStop(1, a.bgSky2 || a.bgSky);
    cc.fillStyle = g;
    cc.fillRect(0, 0, 180, 100);
    // Ground hint
    if (!a.canSwim) {
      cc.fillStyle = a.bgGround;
      cc.fillRect(0, 85, 180, 15);
    }
    // Draw animal
    a.draw(cc, 90, 65, 0.7, 1, 0, 0);

    card.addEventListener('click', () => startGame(key));
  });
}

buildMenu();
</script>
