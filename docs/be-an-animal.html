<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<title>Be An Animal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0f1419; touch-action: none;
    user-select: none; -webkit-user-select: none;
    font-family: 'Georgia', 'Times New Roman', serif;
    -webkit-tap-highlight-color: transparent;
  }
  #game { display: block; position: absolute; top: 0; left: 0; }

  #menu {
    position: fixed; inset: 0; z-index: 10;
    background:
      radial-gradient(ellipse at top, #2d5a4a 0%, #1a3d3a 40%, #0f1f2a 100%);
    color: #f4e9d8;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 30px; overflow-y: auto;
  }
  #menu h1 {
    font-size: clamp(2.2rem, 9vw, 4rem);
    margin: 18px 0 2px;
    letter-spacing: 0.12em;
    font-weight: 400;
    color: #f4e9d8;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    font-family: 'Georgia', serif;
  }
  #menu .tag {
    font-size: 0.85rem; letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0.6; margin-bottom: 28px;
    font-family: -apple-system, sans-serif;
  }
  .animals {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; width: 100%; max-width: 540px;
  }
  @media (min-width: 600px) { .animals { grid-template-columns: repeat(4, 1fr); } }

  .card {
    background: rgba(244, 233, 216, 0.06);
    border: 1px solid rgba(244, 233, 216, 0.15);
    border-radius: 3px;
    padding: 12px 8px 10px; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }
  .card::before {
    content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 1px solid rgba(244, 233, 216, 0.08);
    pointer-events: none;
  }
  .card:active {
    transform: scale(0.97);
    background: rgba(244, 233, 216, 0.14);
    border-color: rgba(244, 233, 216, 0.4);
  }
  .card canvas { width: 100%; height: 78px; display: block; }
  .card span {
    font-size: 0.82rem; margin-top: 6px;
    letter-spacing: 0.15em; text-transform: uppercase;
    font-family: -apple-system, sans-serif;
    opacity: 0.9;
  }

  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
  #score {
    position: absolute; top: 14px; left: 14px;
    color: #fff; font-size: 1.3rem; font-weight: 600;
    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    font-family: -apple-system, sans-serif;
    letter-spacing: 0.05em;
  }
  #hint {
    position: absolute; top: 48px; left: 14px; right: 100px;
    color: rgba(255,255,255,0.92); font-size: 0.78rem;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    font-family: -apple-system, sans-serif;
    letter-spacing: 0.04em;
  }
  #menuBtn {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,0.45);
    color: #f4e9d8; border: 1px solid rgba(244,233,216,0.45);
    padding: 7px 14px; border-radius: 3px;
    font-size: 0.75rem; letter-spacing: 0.15em;
    text-transform: uppercase;
    pointer-events: auto; cursor: pointer;
    font-family: -apple-system, sans-serif;
    backdrop-filter: blur(4px);
  }

  .pad {
    position: absolute; bottom: 22px;
    display: flex; gap: 10px; pointer-events: auto;
  }
  .pad.left { left: 20px; }
  .pad.right { right: 20px; }
  .ctrl {
    width: 58px; height: 58px;
    background: rgba(244, 233, 216, 0.22);
    backdrop-filter: blur(8px);
    border: 2px solid rgba(244, 233, 216, 0.55);
    border-radius: 50%;
    color: #f4e9d8; display: flex;
    align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700;
    user-select: none;
    transition: transform 0.08s, background 0.08s;
    font-family: -apple-system, sans-serif;
  }
  .ctrl:active {
    background: rgba(244, 233, 216, 0.5);
    transform: scale(0.88);
  }
  .ctrl small {
    font-size: 0.55rem; letter-spacing: 0.1em;
    position: absolute; bottom: -14px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    opacity: 0.85;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="menu">
  <h1>BE AN ANIMAL</h1>
  <div class="tag">choose your creature</div>
  <div class="animals" id="cards"></div>
</div>

<div id="hud" class="hidden">
  <div id="score">Score: 0</div>
  <div id="hint"></div>
  <button id="menuBtn">Menu</button>
  <div class="pad left">
    <div class="ctrl" data-key="left">&#9664;</div>
    <div class="ctrl" data-key="right">&#9654;</div>
  </div>
  <div class="pad right">
    <div class="ctrl" data-key="action">A<small>ACTION</small></div>
    <div class="ctrl" data-key="up">&#9650;<small>JUMP</small></div>
    <div class="ctrl hidden" data-key="down" id="diveBtn">&#9660;<small>DIVE</small></div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---------- ANIMAL DRAWINGS ----------

function drawFrog(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.25)';
  c.beginPath(); c.ellipse(0, 28, 38, 5, 0, 0, Math.PI*2); c.fill();
  // Back legs
  c.fillStyle = '#3a7a3a';
  c.beginPath(); c.ellipse(-22, 14, 18, 10, -0.35, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(22, 14, 18, 10, 0.35, 0, Math.PI*2); c.fill();
  // Front legs
  c.fillStyle = '#4a8a4a';
  c.beginPath(); c.ellipse(-15, 18, 6, 4, 0.2, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(15, 18, 6, 4, -0.2, 0, Math.PI*2); c.fill();
  // Body
  c.fillStyle = '#5aa85a';
  c.beginPath(); c.ellipse(0, 0, 32, 22, 0, 0, Math.PI*2); c.fill();
  // Belly
  c.fillStyle = '#c0dca0';
  c.beginPath(); c.ellipse(0, 10, 22, 10, 0, 0, Math.PI*2); c.fill();
  // Eye bumps
  c.fillStyle = '#5aa85a';
  c.beginPath(); c.arc(-14, -18, 11, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(14, -18, 11, 0, Math.PI*2); c.fill();
  // Eye whites
  c.fillStyle = 'white';
  c.beginPath(); c.arc(-14, -20, 7, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(14, -20, 7, 0, Math.PI*2); c.fill();
  // Pupils
  c.fillStyle = 'black';
  c.beginPath(); c.arc(-14, -20, 3.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(14, -20, 3.5, 0, Math.PI*2); c.fill();
  // Mouth
  c.strokeStyle = '#2a5a2a'; c.lineWidth = 2;
  c.beginPath(); c.arc(0, -2, 14, 0.15, Math.PI - 0.15); c.stroke();
  // Spots
  c.fillStyle = '#3a7a3a';
  c.beginPath(); c.arc(-20, -5, 3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(20, -5, 3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(0, -8, 2.5, 0, Math.PI*2); c.fill();
  // Tongue
  if (action > 0) {
    c.strokeStyle = '#ff6688'; c.lineWidth = 5; c.lineCap = 'round';
    c.beginPath(); c.moveTo(5, 5);
    c.quadraticCurveTo(30, -5 - action*15, 15 + action*55, -25 - action*20);
    c.stroke();
    c.fillStyle = '#ff3366';
    c.beginPath(); c.arc(15 + action*55, -25 - action*20, 4, 0, Math.PI*2); c.fill();
  }
  c.restore();
}

function drawSnake(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.2)';
  c.beginPath(); c.ellipse(-30, 15, 60, 4, 0, 0, Math.PI*2); c.fill();
  const segs = 11;
  for (let i = segs - 1; i >= 0; i--) {
    const sx = -i * 13;
    const sy = Math.sin(t * 0.015 + i * 0.6) * 7;
    const r = 13 - i * 0.6;
    c.fillStyle = i % 2 ? '#4a9044' : '#5aa84a';
    c.beginPath(); c.arc(sx, sy, r, 0, Math.PI*2); c.fill();
    // Diamond pattern
    if (i % 2 === 0 && i < segs - 1) {
      c.fillStyle = '#2a5a2a';
      c.beginPath(); c.arc(sx, sy - 2, 3, 0, Math.PI*2); c.fill();
    }
  }
  // Head
  c.fillStyle = '#6ab85a';
  c.beginPath(); c.ellipse(10, Math.sin(t * 0.015) * 7, 18, 13, 0, 0, Math.PI*2); c.fill();
  // Eye
  c.fillStyle = 'white';
  c.beginPath(); c.arc(18, Math.sin(t * 0.015) * 7 - 5, 3.5, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(19, Math.sin(t * 0.015) * 7 - 5, 2, 0, Math.PI*2); c.fill();
  // Forked tongue flickers
  if (Math.sin(t * 0.04) > 0.3 || action > 0) {
    c.strokeStyle = '#ff2266'; c.lineWidth = 2; c.lineCap = 'round';
    const ty = Math.sin(t * 0.015) * 7;
    c.beginPath();
    c.moveTo(26, ty + 2);
    c.lineTo(36, ty);
    c.lineTo(40, ty - 3);
    c.moveTo(36, ty);
    c.lineTo(40, ty + 3);
    c.stroke();
  }
  // Nostril
  c.fillStyle = '#2a5a2a';
  c.beginPath(); c.arc(24, Math.sin(t * 0.015) * 7 - 1, 1, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawTurtle(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.25)';
  c.beginPath(); c.ellipse(0, 22, 42, 5, 0, 0, Math.PI*2); c.fill();
  // Legs animate
  const lw = Math.sin(t * 0.08) * 2;
  c.fillStyle = '#7a9a3a';
  c.beginPath(); c.ellipse(-24 + lw, 16, 9, 6, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(24 - lw, 16, 9, 6, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(-17 - lw, 19, 7, 5, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(17 + lw, 19, 7, 5, 0, 0, Math.PI*2); c.fill();
  // Tail
  c.fillStyle = '#7a9a3a';
  c.beginPath();
  c.moveTo(-26, 3); c.lineTo(-36, 7); c.lineTo(-30, 12); c.closePath(); c.fill();
  // Head (extended unless hiding)
  const headOut = action ? 0.3 : 1;
  c.fillStyle = '#9ab853';
  c.beginPath(); c.ellipse(25 * headOut + 5, -4, 13 * headOut + 2, 10 * headOut + 2, 0, 0, Math.PI*2); c.fill();
  if (headOut > 0.5) {
    // Eye
    c.fillStyle = 'white';
    c.beginPath(); c.arc(33, -7, 3, 0, Math.PI*2); c.fill();
    c.fillStyle = 'black';
    c.beginPath(); c.arc(34, -7, 1.5, 0, Math.PI*2); c.fill();
    // Mouth
    c.strokeStyle = '#5a7a2a'; c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(31, -1); c.lineTo(38, 0); c.stroke();
  }
  // Shell dome
  c.fillStyle = '#8a5a33';
  c.beginPath(); c.ellipse(0, -2, 30, 20, 0, 0, Math.PI*2); c.fill();
  // Shell highlight
  c.fillStyle = '#a87a4a';
  c.beginPath(); c.ellipse(-5, -8, 18, 8, -0.2, 0, Math.PI*2); c.fill();
  // Hexagonal pattern
  c.strokeStyle = '#5a3a1a'; c.lineWidth = 1.5;
  c.fillStyle = 'rgba(90, 58, 26, 0.4)';
  const hexes = [[0, -10], [-13, -3], [13, -3], [-7, 7], [7, 7], [0, 0]];
  hexes.forEach(([hx, hy]) => {
    c.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3;
      const px = hx + Math.cos(a) * 6;
      const py = hy + Math.sin(a) * 5;
      if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
    }
    c.closePath(); c.fill(); c.stroke();
  });
  c.restore();
}

function drawWhale(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Tail flukes
  c.fillStyle = '#3a6b9f';
  c.beginPath();
  c.moveTo(-42, -2);
  c.quadraticCurveTo(-60, -18, -68, -20);
  c.quadraticCurveTo(-58, -8, -55, 0);
  c.quadraticCurveTo(-58, 8, -68, 20);
  c.quadraticCurveTo(-60, 18, -42, 2);
  c.closePath(); c.fill();
  // Body
  c.fillStyle = '#4a7cb4';
  c.beginPath(); c.ellipse(0, 0, 48, 28, 0, 0, Math.PI*2); c.fill();
  // Belly
  c.fillStyle = '#c0d8ec';
  c.beginPath(); c.ellipse(0, 14, 40, 10, 0, 0, Math.PI*2); c.fill();
  // Belly grooves
  c.strokeStyle = '#8ab8dc'; c.lineWidth = 1;
  for (let i = -2; i <= 2; i++) {
    c.beginPath(); c.moveTo(-20 + i * 8, 5); c.lineTo(-20 + i * 8, 20); c.stroke();
  }
  // Top fin
  c.fillStyle = '#3a6b9f';
  c.beginPath();
  c.moveTo(0, -24);
  c.quadraticCurveTo(-5, -38, -10, -28);
  c.lineTo(8, -22);
  c.closePath(); c.fill();
  // Side fin
  c.beginPath();
  c.ellipse(-12, 14, 14, 6, 0.6, 0, Math.PI*2); c.fill();
  // Eye
  c.fillStyle = 'white';
  c.beginPath(); c.arc(24, -4, 3.5, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(26, -4, 1.8, 0, Math.PI*2); c.fill();
  // Mouth
  c.strokeStyle = '#2a4a78'; c.lineWidth = 2.5;
  c.beginPath();
  c.moveTo(15, 10);
  c.quadraticCurveTo(30, 14, 44, 8);
  c.stroke();
  // Blowhole spout
  if (action > 0) {
    c.fillStyle = 'rgba(180, 210, 240, 0.85)';
    c.beginPath();
    c.ellipse(-5, -40 - action * 20, 4 + action * 3, 18 + action * 15, 0, 0, Math.PI*2);
    c.fill();
    for (let i = 0; i < 5; i++) {
      c.beginPath();
      c.arc(-5 + Math.sin(t * 0.3 + i) * 8, -50 - action * 30 - i * 8, 3, 0, Math.PI*2);
      c.fill();
    }
  }
  c.restore();
}

function drawElephant(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.25)';
  c.beginPath(); c.ellipse(0, 42, 55, 6, 0, 0, Math.PI*2); c.fill();
  // Back legs
  c.fillStyle = '#7a7a80';
  c.fillRect(-32, 8, 13, 34);
  c.fillRect(-14, 8, 13, 34);
  // Front legs
  c.fillStyle = '#8a8a90';
  c.fillRect(8, 8, 13, 34);
  c.fillRect(26, 8, 13, 34);
  // Toenails
  c.fillStyle = '#f0e8d8';
  [-25, -7, 15, 33].forEach(lx => {
    c.beginPath(); c.arc(lx, 41, 3.5, 0, Math.PI*2); c.fill();
  });
  // Body
  c.fillStyle = '#98989e';
  c.beginPath(); c.ellipse(0, -6, 45, 27, 0, 0, Math.PI*2); c.fill();
  // Tail
  c.strokeStyle = '#7a7a80'; c.lineWidth = 3;
  c.beginPath();
  c.moveTo(-42, -12); c.quadraticCurveTo(-52, 0, -55, 10); c.stroke();
  c.fillStyle = '#5a5a60';
  c.beginPath(); c.arc(-55, 10, 4, 0, Math.PI*2); c.fill();
  // Head
  c.fillStyle = '#a0a0a6';
  c.beginPath(); c.ellipse(40, -18, 24, 24, 0, 0, Math.PI*2); c.fill();
  // Ear
  c.fillStyle = '#8a8a90';
  c.beginPath(); c.ellipse(28, -26, 17, 22, -0.35, 0, Math.PI*2); c.fill();
  c.fillStyle = '#a8a8ae';
  c.beginPath(); c.ellipse(30, -25, 12, 17, -0.35, 0, Math.PI*2); c.fill();
  // Trunk - curls up when action
  c.strokeStyle = '#98989e'; c.lineWidth = 13; c.lineCap = 'round';
  c.beginPath(); c.moveTo(58, -10);
  if (action > 0) {
    c.quadraticCurveTo(75, 5 - action * 20, 70 - action * 5, -20 - action * 25);
  } else {
    c.quadraticCurveTo(72, 10, 66, 28);
  }
  c.stroke();
  // Trunk tip
  c.lineWidth = 3;
  c.beginPath();
  if (action > 0) {
    c.moveTo(70 - action * 5, -20 - action * 25);
    c.lineTo(73 - action * 5, -18 - action * 25);
  } else {
    c.moveTo(66, 28); c.lineTo(70, 30);
  }
  c.stroke();
  // Tusks
  c.fillStyle = '#f4ead4';
  c.beginPath();
  c.moveTo(48, -2); c.quadraticCurveTo(56, 6, 52, 12);
  c.lineTo(47, 8); c.closePath(); c.fill();
  c.strokeStyle = '#d4c0a0'; c.lineWidth = 0.8; c.stroke();
  // Eye
  c.fillStyle = 'white';
  c.beginPath(); c.arc(44, -22, 3, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(45, -22, 1.5, 0, Math.PI*2); c.fill();
  // Wrinkles
  c.strokeStyle = '#7a7a80'; c.lineWidth = 0.8;
  c.beginPath(); c.moveTo(62, -5); c.lineTo(67, -7); c.stroke();
  c.beginPath(); c.moveTo(62, 2); c.lineTo(68, 0); c.stroke();
  c.restore();
}

function drawGiraffe(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.25)';
  c.beginPath(); c.ellipse(0, 65, 40, 5, 0, 0, Math.PI*2); c.fill();
  // Legs
  c.fillStyle = '#e8b064';
  c.fillRect(-24, 20, 9, 45);
  c.fillRect(-10, 20, 9, 45);
  c.fillRect(6, 20, 9, 45);
  c.fillRect(22, 20, 9, 45);
  // Hooves
  c.fillStyle = '#3a2414';
  [-24, -10, 6, 22].forEach(lx => c.fillRect(lx, 63, 9, 4));
  // Body
  c.fillStyle = '#f0bc6c';
  c.beginPath(); c.ellipse(0, 5, 32, 20, 0, 0, Math.PI*2); c.fill();
  // Body spots
  c.fillStyle = '#8a5420';
  [[-18, 0], [-8, 10], [4, 0], [16, 8], [-22, 10], [10, 14], [22, 2], [-14, 18]].forEach(([sx, sy]) => {
    c.beginPath();
    c.ellipse(sx, sy, 4.5, 3.5, Math.random() * 0.5, 0, Math.PI*2);
    c.fill();
  });
  // Neck (bends with action)
  c.fillStyle = '#f0bc6c';
  const neckBend = action ? 15 : 0;
  c.save();
  c.translate(18, -10);
  c.rotate(action ? 0.3 : 0);
  c.fillRect(0, -50, 12, 55);
  // Neck spots
  c.fillStyle = '#8a5420';
  for (let i = 0; i < 4; i++) {
    c.beginPath(); c.arc(6, -44 + i * 13, 3, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(2, -38 + i * 13, 2, 0, Math.PI*2); c.fill();
  }
  // Mane
  c.strokeStyle = '#6a3a14'; c.lineWidth = 2.5;
  for (let i = 0; i < 6; i++) {
    c.beginPath();
    c.moveTo(0, -45 + i * 9);
    c.lineTo(-5, -48 + i * 9);
    c.stroke();
  }
  // Head
  c.fillStyle = '#f0bc6c';
  c.beginPath(); c.ellipse(15, -55, 15, 10, 0.15, 0, Math.PI*2); c.fill();
  // Snout
  c.fillStyle = '#e8a858';
  c.beginPath(); c.ellipse(24, -52, 8, 6, 0.15, 0, Math.PI*2); c.fill();
  // Ossicones
  c.strokeStyle = '#f0bc6c'; c.lineWidth = 4; c.lineCap = 'round';
  c.beginPath(); c.moveTo(8, -60); c.lineTo(6, -72); c.stroke();
  c.beginPath(); c.moveTo(14, -62); c.lineTo(13, -74); c.stroke();
  c.fillStyle = '#3a2414';
  c.beginPath(); c.arc(6, -73, 3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(13, -75, 3, 0, Math.PI*2); c.fill();
  // Ear
  c.fillStyle = '#e8a858';
  c.beginPath(); c.ellipse(5, -60, 5, 3, -0.4, 0, Math.PI*2); c.fill();
  // Eye
  c.fillStyle = 'white';
  c.beginPath(); c.arc(18, -58, 2.2, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';

function drawRaptor(c, x, y, s, dir, action, t) {

  // Nostril
  c.fillStyle = 'black';
  c.beginPath(); c.arc(40, -25, 1, 0, Math.PI*2); c.fill();

  // Action speed lines

    for (let i = 0; i < 5; i++) {

}

}

function drawStegosaurus(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  const step = Math.sin(t * 0.15) * 1.5;
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.beginPath(); c.ellipse(0, 52, 78, 7, 0, 0, Math.PI*2); c.fill();
  // Tail (swings with action)
  const tailSwing = action ? Math.sin(t * 0.6) * 10 : Math.sin(t * 0.1) * 2;
  c.fillStyle = '#6a7a48';
  c.beginPath();
  c.moveTo(-28, 2);
  c.quadraticCurveTo(-72, -5 + tailSwing, -108, 12 + tailSwing);
  c.lineTo(-108, 22 + tailSwing);
  c.quadraticCurveTo(-72, 10 + tailSwing, -28, 22);
  c.closePath(); c.fill();
  // Thagomizer (4 tail spikes)
  c.fillStyle = '#d8c898';
  const tipX = -102, tipY = 12 + tailSwing;
  for (let i = 0; i < 4; i++) {
    const ang = -0.9 + i * 0.5;
    const spX = tipX + Math.cos(ang) * -18;
    const spY = tipY + Math.sin(ang) * 16;
    c.beginPath();
    c.moveTo(tipX + i * -2, tipY + 1);
    c.lineTo(spX, spY);
    c.lineTo(tipX + i * -2 - 4, tipY - 3);
    c.closePath();
    c.fill();
  }
  c.strokeStyle = '#8a7a58'; c.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const ang = -0.9 + i * 0.5;
    const spX = tipX + Math.cos(ang) * -18;
    const spY = tipY + Math.sin(ang) * 16;
    c.beginPath();
    c.moveTo(tipX + i * -2 - 1, tipY);
    c.lineTo(spX, spY);
    c.stroke();
  }
  // Back legs (stocky)
  c.fillStyle = '#5a6a38';
  c.beginPath();
  c.moveTo(-22, 8); c.lineTo(-28, 30 + step); c.lineTo(-16, 52);
  c.lineTo(2, 52); c.lineTo(-2, 30); c.lineTo(-6, 12);
  c.closePath(); c.fill();
  // Front legs
  c.fillStyle = '#6a7a48';
  c.beginPath();
  c.moveTo(20, 10); c.lineTo(14, 32 - step); c.lineTo(26, 52);
  c.lineTo(42, 52); c.lineTo(38, 30); c.lineTo(32, 14);
  c.closePath(); c.fill();
  // Toe nails
  c.fillStyle = '#3a2a18';
  [[-14, 52], [0, 52], [28, 52], [40, 52]].forEach(([fx, fy]) => {
    c.beginPath();
    c.arc(fx, fy + 1, 2, 0, Math.PI); c.fill();
  });
  // Body (arched back)
  c.fillStyle = '#7a8a58';
  c.beginPath();
  c.moveTo(-28, 2);
  c.quadraticCurveTo(-20, -28, 0, -30);
  c.quadraticCurveTo(22, -28, 30, -10);
  c.quadraticCurveTo(35, 10, 25, 22);
  c.lineTo(-22, 22);
  c.quadraticCurveTo(-34, 15, -28, 2);
  c.closePath(); c.fill();
  // Belly
  c.fillStyle = '#a8b878';
  c.beginPath(); c.ellipse(2, 18, 30, 6, 0, 0, Math.PI*2); c.fill();
  // Back plates (alternating two rows)
  const plates = [
    { x: -24, w: 12, h: 18, off: 1 },
    { x: -10, w: 16, h: 26, off: 0 },
    { x: 4, w: 18, h: 30, off: 1 },
    { x: 18, w: 16, h: 26, off: 0 },
    { x: 30, w: 12, h: 18, off: 1 }
  ];
  plates.forEach(p => {
    // Main plate
    c.fillStyle = p.off ? '#b04838' : '#c85848';
    c.beginPath();
    c.moveTo(p.x - p.w/2, -25);
    c.quadraticCurveTo(p.x - p.w/4, -25 - p.h, p.x, -25 - p.h);
    c.quadraticCurveTo(p.x + p.w/4, -25 - p.h, p.x + p.w/2, -25);
    c.closePath(); c.fill();
    // Shadow on plate
    c.fillStyle = p.off ? '#802820' : '#903828';
    c.beginPath();
    c.moveTo(p.x - p.w/2, -25);
    c.quadraticCurveTo(p.x - p.w/3, -25 - p.h*0.7, p.x - 1, -25 - p.h*0.5);
    c.quadraticCurveTo(p.x - p.w/4, -25 - p.h*0.3, p.x - p.w/2, -25);
    c.closePath(); c.fill();
  });
  // Head (small, held low)
  c.fillStyle = '#6a7a48';
  c.beginPath(); c.ellipse(44, 8, 18, 12, -0.1, 0, Math.PI*2); c.fill();
  // Snout
  c.beginPath(); c.ellipse(58, 12, 10, 7, 0, 0, Math.PI*2); c.fill();
  // Beak
  c.fillStyle = '#3a2a18';
  c.beginPath();
  c.moveTo(62, 9); c.lineTo(68, 13); c.lineTo(62, 17);
  c.closePath(); c.fill();
  // Eye
  c.fillStyle = 'white';
  c.beginPath(); c.arc(49, 4, 2, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(49, 4, 1, 0, Math.PI*2); c.fill();
  // Skin bumps
  c.fillStyle = 'rgba(50, 60, 30, 0.4)';
  for (let i = 0; i < 8; i++) {
    c.beginPath();
    c.arc(-28 + i * 8, 12 + Math.sin(i) * 3, 1.4, 0, Math.PI*2);
    c.fill();
  }
  c.restore();
}

function drawSpinosaurus(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  const stride = Math.sin(t * 0.2) * 3;

  c.lineTo(-108, 14 + tailWave);
  c.lineTo(-98, 22 + tailWave);
  c.quadraticCurveTo(-60, 12 + tailWave, -22, 18);

  c.beginPath();
  c.moveTo(-96, 6 + tailWave);
  c.lineTo(-118, -4 + tailWave);
  c.lineTo(-110, 14 + tailWave);
  c.lineTo(-118, 28 + tailWave);
  c.lineTo(-96, 22 + tailWave);

  c.fillStyle = '#5a1a28';

  c.moveTo(-10, 5); c.lineTo(-18 + stride, 32); c.lineTo(-8 + stride, 52);
  c.lineTo(10 + stride, 52); c.lineTo(8, 30); c.lineTo(6, 10);
  c.closePath(); c.fill();
  // Front leg (close)
  c.fillStyle = '#7a2a38';
  c.beginPath();
  c.moveTo(12, 10); c.lineTo(4 - stride, 36); c.lineTo(16 - stride, 52);
  c.lineTo(32 - stride, 52); c.lineTo(28, 30); c.lineTo(22, 12);
  c.closePath(); c.fill();
  // Foot claws
  c.fillStyle = 'white';
  [[-4 + stride, 52], [6 + stride, 52], [18 - stride, 52], [28 - stride, 52]].forEach(([fx, fy]) => {
    c.beginPath();
    c.moveTo(fx, fy); c.lineTo(fx + 3, fy + 5); c.lineTo(fx + 6, fy);

  });
  // Sail (iconic crescent)

  sailGrad.addColorStop(0, '#a84858');
  sailGrad.addColorStop(1, '#6a1a28');
  c.fillStyle = sailGrad;
  c.beginPath();
  c.moveTo(-22, -2);
  c.bezierCurveTo(-20, -55, -5, -78, 8, -78);
  c.bezierCurveTo(22, -78, 32, -50, 30, -8);
  c.closePath(); c.fill();
  // Sail stripes
  c.strokeStyle = 'rgba(50, 10, 20, 0.7)'; c.lineWidth = 2;
  for (let i = 0; i < 6; i++) {
    const baseX = -20 + i * 9;
    c.beginPath();
    c.moveTo(baseX, -6);
    c.quadraticCurveTo(baseX + 2, -45, baseX + 4, -72 + Math.abs(i - 3) * 4);
    c.stroke();
  }
  // Sail edge highlight
  c.strokeStyle = '#c85868'; c.lineWidth = 1.5;
  c.beginPath();
  c.moveTo(-22, -4);
  c.bezierCurveTo(-20, -55, -5, -76, 8, -76);
  c.stroke();
  // Body
  c.fillStyle = '#7a2a38';
  c.beginPath(); c.ellipse(0, -2, 42, 22, -0.05, 0, Math.PI*2); c.fill();
  // Belly
  c.fillStyle = '#c0887c';
  c.beginPath(); c.ellipse(2, 15, 32, 7, 0, 0, Math.PI*2); c.fill();
  // Tiny arms with claws
  c.fillStyle = '#5a1a28';
  c.beginPath(); c.ellipse(22, 8, 10, 4, 0.35, 0, Math.PI*2); c.fill();
  c.strokeStyle = 'white'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(30, 6); c.lineTo(35, 4); c.stroke();
  c.beginPath(); c.moveTo(30, 9); c.lineTo(35, 10); c.stroke();
  c.beginPath(); c.moveTo(30, 11); c.lineTo(34, 13); c.stroke();
  // Head
  c.fillStyle = '#7a2a38';
  c.beginPath(); c.ellipse(32, -28, 18, 12, -0.05, 0, Math.PI*2); c.fill();
  // Long crocodile snout
  const jawOpen = action ? 9 : 1;
  c.fillStyle = '#6a2030';
  c.beginPath();
  c.moveTo(40, -32);
  c.lineTo(86, -29);
  c.lineTo(88, -24 - jawOpen * 0.3);
  c.lineTo(40, -22);
  c.closePath(); c.fill();
  // Lower jaw

  c.lineTo(88, -15 + jawOpen);
  c.lineTo(40, -15 + jawOpen * 0.3);
  c.closePath(); c.fill();
  // Mouth interior

    c.beginPath();

    c.lineTo(82, -22);
    c.lineTo(82, -18 + jawOpen);
    c.lineTo(46, -17 + jawOpen * 0.3);
    c.closePath(); c.fill();
  }
  // Upper teeth (conical)
  c.fillStyle = 'white';
  for (let i = 0; i < 10; i++) {
    c.beginPath();
    c.moveTo(44 + i * 4, -22);
    c.lineTo(45 + i * 4, -15);
    c.lineTo(46 + i * 4, -22);
    c.closePath(); c.fill();
  }
  // Lower teeth
  for (let i = 0; i < 9; i++) {
    c.beginPath();
    c.moveTo(46 + i * 4, -16 + jawOpen * 0.3);
