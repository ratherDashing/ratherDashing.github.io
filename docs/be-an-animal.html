    c.lineTo(48 + i * 4, -16 + jawOpen * 0.3);
    c.closePath(); c.fill();
  }
  // Eye
  c.fillStyle = '#ffcc44';
  c.beginPath(); c.arc(28, -34, 3, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.ellipse(29, -34, 1.2, 2.4, 0, 0, Math.PI*2); c.fill();
  // Head ridges
  c.fillStyle = '#5a1a28';
  for (let i = 0; i < 4; i++) {
    c.beginPath();
    c.arc(44 + i * 10, -36 + Math.sin(i) * 2, 2.2, 0, Math.PI*2); c.fill();
  }
  // Nostril at snout tip
  c.fillStyle = 'black';
  c.beginPath(); c.arc(82, -27, 1.8, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawAllosaurus(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  const stride = Math.sin(t * 0.22) * 3;
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.28)';
  c.beginPath(); c.ellipse(0, 52, 68, 6, 0, 0, Math.PI*2); c.fill();
  // Tail (long, held horizontal for balance)
  const tailWave = Math.sin(t * 0.18) * 3;
  c.fillStyle = '#8a6a3a';
  c.beginPath();
  c.moveTo(-22, -2);
  c.quadraticCurveTo(-58, -14 + tailWave, -96, -4 + tailWave);
  c.lineTo(-104, 0 + tailWave);
  c.lineTo(-96, 6 + tailWave);
  c.quadraticCurveTo(-58, 10 + tailWave, -22, 18);
  c.closePath(); c.fill();
  // Tail bands
  c.fillStyle = '#6a4a28';
  for (let i = 0; i < 5; i++) {
    c.beginPath();
    c.ellipse(-34 - i * 12, -4 + i * 1 + tailWave * (1 - i * 0.15), 4, 2.5, -0.2, 0, Math.PI*2);
    c.fill();
  }
  // Back leg (far)
  c.fillStyle = '#6a5028';
  c.beginPath();
  c.moveTo(-12, 4); c.lineTo(-20 + stride, 28); c.lineTo(-10 + stride, 52);
  c.lineTo(8 + stride, 52); c.lineTo(6, 28); c.lineTo(4, 10);
  c.closePath(); c.fill();
  // Front leg (close)
  c.fillStyle = '#8a6a3a';
  c.beginPath();
  c.moveTo(14, 8); c.lineTo(6 - stride, 32); c.lineTo(18 - stride, 52);
  c.lineTo(34 - stride, 52); c.lineTo(30, 30); c.lineTo(24, 12);
  c.closePath(); c.fill();
  // Foot claws (3 toes)
  c.fillStyle = 'white';
  [[-8 + stride, 52], [2 + stride, 52], [10 + stride, 52],
   [18 - stride, 52], [26 - stride, 52], [32 - stride, 52]].forEach(([fx, fy]) => {
    c.beginPath();
    c.moveTo(fx, fy); c.lineTo(fx + 2, fy + 5); c.lineTo(fx + 5, fy);
    c.closePath(); c.fill();
  });
  // Body (muscular, tilted forward)
  c.fillStyle = '#8a6a3a';
  c.beginPath(); c.ellipse(2, -6, 40, 24, -0.1, 0, Math.PI*2); c.fill();
  // Belly
  c.fillStyle = '#c8a06a';
  c.beginPath(); c.ellipse(4, 14, 30, 7, 0, 0, Math.PI*2); c.fill();
  // Arms (longer than T. rex, 3-fingered)
  c.fillStyle = '#6a5028';
  c.beginPath();
  c.moveTo(20, 2); c.lineTo(32, 12); c.lineTo(38, 22); c.lineTo(32, 24);
  c.lineTo(24, 16); c.lineTo(16, 6);
  c.closePath(); c.fill();
  // Three large claws
  c.strokeStyle = 'white'; c.lineWidth = 1.8;
  c.beginPath(); c.moveTo(36, 22); c.lineTo(42, 20); c.stroke();
  c.beginPath(); c.moveTo(36, 24); c.lineTo(42, 25); c.stroke();
  c.beginPath(); c.moveTo(36, 26); c.lineTo(41, 29); c.stroke();
  // Back spines (small ridge)
  c.fillStyle = '#5a3a20';
  for (let i = 0; i < 7; i++) {
    c.beginPath();
    c.moveTo(-24 + i * 9, -28);
    c.lineTo(-22 + i * 9, -33);
    c.lineTo(-20 + i * 9, -28);
    c.closePath(); c.fill();
  }
  // Head (long, narrow)
  c.fillStyle = '#9a7a4a';
  c.beginPath(); c.ellipse(38, -32, 26, 16, -0.05, 0, Math.PI*2); c.fill();
  // Snout extends
  c.beginPath(); c.ellipse(58, -28, 14, 10, 0, 0, Math.PI*2); c.fill();
  // Jaw (opens with action)
  const jawOpen = action ? 14 : 2;
  c.fillStyle = '#7a5a2a';
  c.beginPath();
  c.moveTo(22, -24);
  c.lineTo(72, -22 + jawOpen * 0.25);
  c.lineTo(72, -16 + jawOpen);
  c.lineTo(22, -14);
  c.closePath(); c.fill();
  // Mouth interior
  if (action) {
    c.fillStyle = '#3a0010';
    c.beginPath();
    c.moveTo(28, -22); c.lineTo(68, -20 + jawOpen * 0.25);
    c.lineTo(68, -17 + jawOpen); c.lineTo(28, -16);
    c.closePath(); c.fill();
  }
  // Upper teeth
  c.fillStyle = 'white';
  for (let i = 0; i < 8; i++) {
    c.beginPath();
    c.moveTo(27 + i * 5.5, -22);
    c.lineTo(29 + i * 5.5, -15);
    c.lineTo(31 + i * 5.5, -22);
    c.closePath(); c.fill();
  }
  // Lower teeth
  for (let i = 0; i < 7; i++) {
    c.beginPath();
    c.moveTo(30 + i * 6, -14 + jawOpen);
    c.lineTo(32 + i * 6, -20 + jawOpen);
    c.lineTo(34 + i * 6, -14 + jawOpen);
    c.closePath(); c.fill();
  }
  // Signature brow horns / lacrimal crests (distinctive allosaurus feature)
  c.fillStyle = '#5a3a20';
  c.beginPath();
  c.moveTo(36, -44); c.lineTo(40, -52); c.lineTo(44, -44);
  c.closePath(); c.fill();
  c.beginPath();
  c.moveTo(48, -42); c.lineTo(52, -48); c.lineTo(56, -42);
  c.closePath(); c.fill();
  // Nasal ridge
  c.fillStyle = '#7a5a2a';
  c.beginPath();
  c.ellipse(62, -34, 6, 2.5, -0.15, 0, Math.PI*2); c.fill();
  // Eye
  c.fillStyle = '#ff9922';
  c.beginPath(); c.arc(42, -38, 3.2, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.ellipse(43, -38, 1.1, 2.4, 0, 0, Math.PI*2); c.fill();
  // Nostril
  c.fillStyle = 'black';
  c.beginPath(); c.arc(66, -30, 1.6, 0, Math.PI*2); c.fill();
  // Skin stripes on body (camouflage)
  c.fillStyle = 'rgba(60, 40, 20, 0.45)';
  for (let i = 0; i < 4; i++) {
    c.beginPath();
    c.ellipse(-14 + i * 12, -16 + Math.sin(i) * 4, 8, 2, 0.3, 0, Math.PI*2);
    c.fill();
  }
  c.restore();
}

function drawMosasaurus(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  const undulate = Math.sin(t * 0.15) * 4;
  // Shadow on seabed (far below)
  c.fillStyle = 'rgba(0,0,0,0.15)';
  c.beginPath(); c.ellipse(0, 70, 80, 6, 0, 0, Math.PI*2); c.fill();
  // Tail (long, serpentine)
  const tailBase = Math.sin(t * 0.15) * 6;
  c.fillStyle = '#2a4a3a';
  c.beginPath();
  c.moveTo(-30, -6);
  c.quadraticCurveTo(-60, -18 + tailBase, -95, -4 + tailBase * 1.3);
  c.lineTo(-110, 0 + tailBase * 1.4);
  c.lineTo(-95, 6 + tailBase * 1.3);
  c.quadraticCurveTo(-60, 14 + tailBase, -30, 12);
  c.closePath(); c.fill();
  // Shark-like tail fluke (downturned heterocercal)
  c.fillStyle = '#1a3a2a';
  c.beginPath();
  c.moveTo(-100, -4 + tailBase * 1.4);
  c.lineTo(-122, -18 + tailBase * 1.5);
  c.lineTo(-116, -4 + tailBase * 1.5);
  c.lineTo(-128, 8 + tailBase * 1.5);
  c.lineTo(-100, 4 + tailBase * 1.4);
  c.closePath(); c.fill();
  // Tail keel (top ridge)
  c.fillStyle = '#1a3a2a';
  for (let i = 0; i < 5; i++) {
    const px = -40 - i * 12;
    const py = -10 - i * 1 + tailBase * (0.5 + i * 0.15);
    c.beginPath();
    c.moveTo(px, py); c.lineTo(px + 4, py - 4); c.lineTo(px + 8, py);
    c.closePath(); c.fill();
  }
  // Back flippers (rear paddles)
  const fpSwing = Math.sin(t * 0.18) * 3;
  c.fillStyle = '#3a5a48';
  c.beginPath();
  c.moveTo(-18, 10);
  c.quadraticCurveTo(-26, 28 + fpSwing, -12, 38 + fpSwing);
  c.quadraticCurveTo(-4, 32 + fpSwing, -6, 16);
  c.closePath(); c.fill();
  // Back flipper (far side, smaller)
  c.fillStyle = '#2a4a38';
  c.beginPath();
  c.moveTo(-14, -4);
  c.quadraticCurveTo(-22, -20 - fpSwing, -8, -30 - fpSwing);
  c.quadraticCurveTo(0, -22 - fpSwing, -4, -8);
  c.closePath(); c.fill();
  // Body (long serpentine)
  c.fillStyle = '#3a5a48';
  c.beginPath(); c.ellipse(0, -2, 46, 20, 0, 0, Math.PI*2); c.fill();
  // Belly counter-shading
  c.fillStyle = '#c8d8a8';
  c.beginPath(); c.ellipse(2, 10, 38, 10, 0, 0, Math.PI*2); c.fill();
  // Belly line transition
  c.fillStyle = 'rgba(80, 110, 80, 0.6)';
  c.beginPath(); c.ellipse(2, 4, 40, 5, 0, 0, Math.PI*2); c.fill();
  // Front flippers (larger paddles)
  const frSwing = Math.sin(t * 0.18 + 1) * 4;
  c.fillStyle = '#2a4a38';
  // Front flipper close
  c.beginPath();
  c.moveTo(12, 12);
  c.quadraticCurveTo(18, 32 + frSwing, 36, 38 + frSwing);
  c.quadraticCurveTo(42, 28 + frSwing, 26, 16);
  c.closePath(); c.fill();
  // Front flipper far
  c.fillStyle = '#1a3a2a';
  c.beginPath();
  c.moveTo(14, -6);
  c.quadraticCurveTo(20, -22 - frSwing, 36, -28 - frSwing);
  c.quadraticCurveTo(42, -18 - frSwing, 28, -10);
  c.closePath(); c.fill();
  // Scutes along back
  c.fillStyle = '#1a3a2a';
  for (let i = 0; i < 8; i++) {
    const sx = -30 + i * 8;
    const sy = -20 + Math.sin(i * 0.5) * 2;
    c.beginPath();
    c.arc(sx, sy, 2.5, 0, Math.PI*2); c.fill();
  }
  // Dappled pattern on back
  c.fillStyle = 'rgba(15, 30, 20, 0.5)';
  for (let i = 0; i < 10; i++) {
    const dx = -32 + i * 7 + Math.sin(i) * 2;
    const dy = -14 + Math.cos(i * 1.2) * 6;
    c.beginPath();
    c.ellipse(dx, dy, 3.5, 2, 0.2, 0, Math.PI*2);
    c.fill();
  }
  // Head (large, elongated crocodilian)
  c.fillStyle = '#3a5a48';
  c.beginPath(); c.ellipse(42, -8, 28, 16, -0.03, 0, Math.PI*2); c.fill();
  // Long snout
  c.beginPath(); c.ellipse(68, -5, 18, 10, 0.02, 0, Math.PI*2); c.fill();
  // Jaw (opens wide with action)
  const jawOpen = action ? 16 : 2;
  c.fillStyle = '#2a4a38';
  c.beginPath();
  c.moveTo(22, -4);
  c.lineTo(86, -2 + jawOpen * 0.2);
  c.lineTo(86, 4 + jawOpen);
  c.lineTo(22, 6);
  c.closePath(); c.fill();
  // Mouth interior
  if (action) {
    c.fillStyle = '#4a0818';
    c.beginPath();
    c.moveTo(30, -2); c.lineTo(82, 0 + jawOpen * 0.2);
    c.lineTo(82, 3 + jawOpen); c.lineTo(30, 4);
    c.closePath(); c.fill();
  }
  // Upper teeth (many, conical, recurved)
  c.fillStyle = 'white';
  for (let i = 0; i < 12; i++) {
    c.beginPath();
    c.moveTo(28 + i * 5, -4);
    c.lineTo(29 + i * 5, 4);
    c.lineTo(31 + i * 5, -4);
    c.closePath(); c.fill();
  }
  // Lower teeth
  for (let i = 0; i < 11; i++) {
    c.beginPath();
    c.moveTo(30 + i * 5, 6 + jawOpen * 0.2);
    c.lineTo(31 + i * 5, -2 + jawOpen);
    c.lineTo(33 + i * 5, 6 + jawOpen * 0.2);
    c.closePath(); c.fill();
  }
  // Signature pterygoid (second row) teeth inside mouth
  if (action) {
    c.fillStyle = '#f0f0f0';
    for (let i = 0; i < 5; i++) {
      c.beginPath();
      c.moveTo(40 + i * 8, -2);
      c.lineTo(41 + i * 8, 2);
      c.lineTo(42 + i * 8, -2);
      c.closePath(); c.fill();
    }
  }
  // Eye (small, high on skull)
  c.fillStyle = '#e8a22a';
  c.beginPath(); c.arc(44, -16, 2.8, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.ellipse(45, -16, 1, 2.2, 0, 0, Math.PI*2); c.fill();
  // Brow ridge
  c.fillStyle = '#1a3a2a';
  c.beginPath();
  c.moveTo(38, -22); c.lineTo(52, -19); c.lineTo(48, -14); c.lineTo(38, -17);
  c.closePath(); c.fill();
  // Nostril near snout tip
  c.fillStyle = 'black';
  c.beginPath(); c.arc(80, -8, 1.6, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawElasmosaurus(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.15)';
  c.beginPath(); c.ellipse(0, 70, 60, 5, 0, 0, Math.PI*2); c.fill();
  // Tail (short, tapered)
  const tailSway = Math.sin(t * 0.14) * 3;
  c.fillStyle = '#4a6a78';
  c.beginPath();
  c.moveTo(-22, -4);
  c.quadraticCurveTo(-40, -6 + tailSway, -54, 0 + tailSway);
  c.lineTo(-60, 2 + tailSway);
  c.lineTo(-54, 6 + tailSway);
  c.quadraticCurveTo(-40, 10 + tailSway, -22, 10);
  c.closePath(); c.fill();
  // Small tail fin tip
  c.fillStyle = '#3a5868';
  c.beginPath();
  c.moveTo(-54, 0 + tailSway);
  c.lineTo(-66, -4 + tailSway);
  c.lineTo(-62, 4 + tailSway);
  c.lineTo(-66, 10 + tailSway);
  c.lineTo(-54, 6 + tailSway);
  c.closePath(); c.fill();
  // Rear flippers (large paddles, rowing motion)
  const rearRow = Math.sin(t * 0.12) * 4;
  // Far rear flipper
  c.fillStyle = '#3a5868';
  c.beginPath();
  c.moveTo(-14, -6);
  c.quadraticCurveTo(-22, -24 - rearRow, -4, -34 - rearRow);
  c.quadraticCurveTo(4, -26 - rearRow, -2, -10);
  c.closePath(); c.fill();
  // Near rear flipper
  c.fillStyle = '#5a7888';
  c.beginPath();
  c.moveTo(-10, 8);
  c.quadraticCurveTo(-18, 26 + rearRow, 0, 36 + rearRow);
  c.quadraticCurveTo(10, 30 + rearRow, 4, 14);
  c.closePath(); c.fill();
  // Body (broad, short, turtle-like)
  c.fillStyle = '#5a7888';
  c.beginPath(); c.ellipse(-2, 0, 30, 18, -0.05, 0, Math.PI*2); c.fill();
  // Belly (counter-shading)
  c.fillStyle = '#c8d8e0';
  c.beginPath(); c.ellipse(0, 10, 24, 7, 0, 0, Math.PI*2); c.fill();
  // Back dappled pattern
  c.fillStyle = 'rgba(30, 50, 65, 0.55)';
  for (let i = 0; i < 7; i++) {
    const dx = -20 + i * 6;
    const dy = -10 + Math.sin(i * 1.3) * 4;
    c.beginPath();
    c.ellipse(dx, dy, 3, 1.6, 0.2, 0, Math.PI*2);
    c.fill();
  }
  // Front flippers (even larger, main propulsion)
  const frontRow = Math.sin(t * 0.12 + Math.PI) * 4;
  // Far front flipper
  c.fillStyle = '#3a5868';
  c.beginPath();
  c.moveTo(8, -8);
  c.quadraticCurveTo(14, -28 - frontRow, 32, -36 - frontRow);
  c.quadraticCurveTo(40, -26 - frontRow, 26, -10);
  c.closePath(); c.fill();
  // Near front flipper
  c.fillStyle = '#5a7888';
  c.beginPath();
  c.moveTo(14, 8);
  c.quadraticCurveTo(22, 28 + frontRow, 42, 38 + frontRow);
  c.quadraticCurveTo(50, 30 + frontRow, 32, 14);
  c.closePath(); c.fill();
  // Flipper highlights (veins)
  c.strokeStyle = 'rgba(180, 200, 210, 0.4)'; c.lineWidth = 1;
  c.beginPath();
  c.moveTo(16, 10); c.quadraticCurveTo(28, 22 + frontRow, 40, 34 + frontRow);
  c.stroke();
  c.beginPath();
  c.moveTo(-8, 10); c.quadraticCurveTo(-4, 20 + rearRow, 0, 32 + rearRow);
  c.stroke();
  // Neck base
  c.fillStyle = '#5a7888';
  c.beginPath(); c.ellipse(18, -8, 10, 8, 0.1, 0, Math.PI*2); c.fill();
  // NECK (extremely long, the signature feature)
  // Draw as a curved sequence of segments
  const neckSeg = 18;
  const neckSway = Math.sin(t * 0.08) * 0.15;
  const actionLift = action ? -10 * action : 0;
  c.fillStyle = '#5a7888';
  c.beginPath();
  // Build neck curve (upper edge)
  const pts = [];
  for (let i = 0; i <= neckSeg; i++) {
    const p = i / neckSeg;
    const cx = 22 + p * 72;
    const cy = -10 - p * 48 + Math.sin(t * 0.04 + p * 3) * 3 + actionLift * p;
    const thickness = 9 - p * 5;
    pts.push({ x: cx, y: cy, th: thickness });
  }
  // Upper edge
  c.moveTo(pts[0].x, pts[0].y - pts[0].th + neckSway * 5);
  for (let i = 1; i < pts.length; i++) {
    c.lineTo(pts[i].x, pts[i].y - pts[i].th);
  }
  // Lower edge (reverse)
  for (let i = pts.length - 1; i >= 0; i--) {
    c.lineTo(pts[i].x, pts[i].y + pts[i].th);
  }
  c.closePath(); c.fill();
  // Neck underside (lighter)
  c.fillStyle = '#a8c0c8';
  c.beginPath();
  c.moveTo(pts[0].x, pts[0].y + pts[0].th * 0.4);
  for (let i = 1; i < pts.length; i++) {
    c.lineTo(pts[i].x, pts[i].y + pts[i].th * 0.4);
  }
  for (let i = pts.length - 1; i >= 0; i--) {
    c.lineTo(pts[i].x, pts[i].y + pts[i].th);
  }
  c.closePath(); c.fill();
  // Neck ring markings
  c.strokeStyle = 'rgba(30, 50, 65, 0.4)'; c.lineWidth = 1;
  for (let i = 2; i < pts.length - 1; i += 2) {
    c.beginPath();
    c.moveTo(pts[i].x - 1, pts[i].y - pts[i].th);
    c.lineTo(pts[i].x + 1, pts[i].y + pts[i].th);
    c.stroke();
  }
  // Head (small, at end of neck)
  const headP = pts[pts.length - 1];
  const hx = headP.x + 8;
  const hy = headP.y - 4;
  c.fillStyle = '#5a7888';
  c.beginPath(); c.ellipse(hx, hy, 10, 6, 0.1, 0, Math.PI*2); c.fill();
  // Snout
  c.beginPath(); c.ellipse(hx + 7, hy + 1, 5, 3, 0.15, 0, Math.PI*2); c.fill();
  // Jaw (opens with action)
  const jawOpen = action ? 5 : 1;
  c.fillStyle = '#3a5868';
  c.beginPath();
  c.moveTo(hx - 4, hy + 1);
  c.lineTo(hx + 12, hy + 2);
  c.lineTo(hx + 12, hy + 2 + jawOpen);
  c.lineTo(hx - 4, hy + 3);
  c.closePath(); c.fill();
  // Teeth (small interlocking)
  c.fillStyle = 'white';
  for (let i = 0; i < 5; i++) {
    c.beginPath();
    c.moveTo(hx - 2 + i * 3, hy + 1);
    c.lineTo(hx - 1 + i * 3, hy + 3);
    c.lineTo(hx + i * 3, hy + 1);
    c.closePath(); c.fill();
  }
  for (let i = 0; i < 5; i++) {
    c.beginPath();
    c.moveTo(hx - 1 + i * 3, hy + 3 + jawOpen);
    c.lineTo(hx + i * 3, hy + 1 + jawOpen);
    c.lineTo(hx + 1 + i * 3, hy + 3 + jawOpen);
    c.closePath(); c.fill();
  }
  // Eye
  c.fillStyle = 'white';
  c.beginPath(); c.arc(hx - 1, hy - 1, 1.6, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(hx - 0.5, hy - 1, 0.9, 0, Math.PI*2); c.fill();
  // Nostril
  c.fillStyle = 'black';
  c.beginPath(); c.arc(hx + 9, hy, 0.7, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawDiplodocus(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  const stride = Math.sin(t * 0.08) * 2;
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.beginPath(); c.ellipse(0, 52, 90, 7, 0, 0, Math.PI*2); c.fill();
  // Tail (extremely long, whip-like, held horizontal)
  // Action triggers a dramatic whip motion
  const whipSwing = action ? Math.sin(t * 0.8) * 18 : Math.sin(t * 0.06) * 3;
  c.fillStyle = '#7a6448';
  // Build tail as a curved tapered shape
  const tailPts = [];
  for (let i = 0; i <= 14; i++) {
    const p = i / 14;
    const tx = -22 - p * 110;
    const ty = -4 + Math.sin(t * 0.06 + p * 4) * 2 + whipSwing * (p * p);
    const th = 9 - p * 7.5;
    tailPts.push({ x: tx, y: ty, th });
  }
  c.beginPath();
  c.moveTo(tailPts[0].x, tailPts[0].y - tailPts[0].th);
  for (let i = 1; i < tailPts.length; i++) {
    c.lineTo(tailPts[i].x, tailPts[i].y - tailPts[i].th);
  }
  for (let i = tailPts.length - 1; i >= 0; i--) {
    c.lineTo(tailPts[i].x, tailPts[i].y + tailPts[i].th);
  }
  c.closePath(); c.fill();
  // Tail underside lighter
  c.fillStyle = '#a89878';
  c.beginPath();
  c.moveTo(tailPts[0].x, tailPts[0].y);
  for (let i = 1; i < tailPts.length; i++) {
    c.lineTo(tailPts[i].x, tailPts[i].y + tailPts[i].th * 0.5);
  }
  for (let i = tailPts.length - 1; i >= 0; i--) {
    c.lineTo(tailPts[i].x, tailPts[i].y + tailPts[i].th);
  }
  c.closePath(); c.fill();
  // Whip crack effect when action
  if (action) {
    const tipP = tailPts[tailPts.length - 1];
    c.strokeStyle = 'rgba(255, 255, 255, 0.7)'; c.lineWidth = 2;
    c.beginPath();
    c.moveTo(tipP.x - 8, tipP.y - 10);
    c.lineTo(tipP.x - 4, tipP.y + 10);
    c.stroke();
    c.beginPath();
    c.moveTo(tipP.x + 6, tipP.y - 8);
    c.lineTo(tipP.x - 2, tipP.y + 8);
    c.stroke();
  }
  // Far side (back) legs
  c.fillStyle = '#5a4830';
  // Far back leg
  c.beginPath();
  c.moveTo(-26, 4); c.lineTo(-32, 30 + stride); c.lineTo(-22, 52);
  c.lineTo(-12, 52); c.lineTo(-14, 30); c.lineTo(-18, 12);
  c.closePath(); c.fill();
  // Far front leg
  c.beginPath();
  c.moveTo(28, 4); c.lineTo(22, 30 - stride); c.lineTo(32, 52);
  c.lineTo(42, 52); c.lineTo(40, 30); c.lineTo(36, 12);
  c.closePath(); c.fill();
  // Body (massive elongated barrel)
  c.fillStyle = '#7a6448';
  c.beginPath(); c.ellipse(0, -4, 50, 24, 0, 0, Math.PI*2); c.fill();
  // Body shading underside
  c.fillStyle = '#a89878';
  c.beginPath(); c.ellipse(2, 12, 42, 8, 0, 0, Math.PI*2); c.fill();
  // Hip hump
  c.fillStyle = '#6a5438';
  c.beginPath(); c.ellipse(-22, -16, 18, 12, -0.1, 0, Math.PI*2); c.fill();
  // Shoulder hump
  c.beginPath(); c.ellipse(22, -14, 16, 10, 0.1, 0, Math.PI*2); c.fill();
  // Near side (front) legs
  c.fillStyle = '#7a6448';
  // Near back leg (taller, stockier)
  c.beginPath();
  c.moveTo(-20, 6); c.lineTo(-26, 32 - stride); c.lineTo(-16, 52);
  c.lineTo(-2, 52); c.lineTo(-6, 30); c.lineTo(-12, 14);
  c.closePath(); c.fill();
  // Near front leg
  c.beginPath();
  c.moveTo(22, 6); c.lineTo(16, 32 + stride); c.lineTo(26, 52);
  c.lineTo(40, 52); c.lineTo(38, 30); c.lineTo(32, 14);
  c.closePath(); c.fill();
  // Toe nails
  c.fillStyle = '#3a2a18';
  [[-22, 52], [-9, 52], [27, 52], [38, 52]].forEach(([fx, fy]) => {
    c.beginPath(); c.arc(fx, fy + 1, 2.2, 0, Math.PI); c.fill();
  });
  // Spine ridge of small triangular spines (recent fossil findings)
  c.fillStyle = '#3a2818';
  for (let i = 0; i < 14; i++) {
    const sx = -34 + i * 5;
    const sy = -28 + Math.sin(i * 0.3) * 1;
    c.beginPath();
    c.moveTo(sx, sy); c.lineTo(sx + 2, sy - 4); c.lineTo(sx + 4, sy);
    c.closePath(); c.fill();
  }
  // NECK (very long, held more horizontal than brachiosaur)
  // Action lifts neck to browse
  const neckLift = action ? -8 : 0;
  const neckPts = [];
  const neckSegs = 16;
  for (let i = 0; i <= neckSegs; i++) {
    const p = i / neckSegs;
    const cx = 30 + p * 80;
    // Gently curving upward then forward
    const cy = -12 - Math.sin(p * Math.PI * 0.6) * 30 + neckLift * p + Math.sin(t * 0.04 + p * 2) * 1.5;
    const thickness = 12 - p * 8;
    neckPts.push({ x: cx, y: cy, th: thickness });
  }
  // Neck body
  c.fillStyle = '#7a6448';
  c.beginPath();
  c.moveTo(neckPts[0].x, neckPts[0].y - neckPts[0].th);
  for (let i = 1; i < neckPts.length; i++) {
    c.lineTo(neckPts[i].x, neckPts[i].y - neckPts[i].th);
  }
  for (let i = neckPts.length - 1; i >= 0; i--) {
    c.lineTo(neckPts[i].x, neckPts[i].y + neckPts[i].th);
  }
  c.closePath(); c.fill();
  // Neck underside lighter
  c.fillStyle = '#a89878';
  c.beginPath();
  c.moveTo(neckPts[0].x, neckPts[0].y);
  for (let i = 1; i < neckPts.length; i++) {
    c.lineTo(neckPts[i].x, neckPts[i].y + neckPts[i].th * 0.4);
  }
  for (let i = neckPts.length - 1; i >= 0; i--) {
    c.lineTo(neckPts[i].x, neckPts[i].y + neckPts[i].th);
  }
  c.closePath(); c.fill();
  // Neck spines (small)
  c.fillStyle = '#3a2818';
  for (let i = 1; i < neckPts.length; i += 1) {
    const np = neckPts[i];
    c.beginPath();
    c.moveTo(np.x - 1, np.y - np.th);
    c.lineTo(np.x, np.y - np.th - 3);
    c.lineTo(np.x + 1, np.y - np.th);
    c.closePath(); c.fill();
  }
  // Head (small, elongated, peg-toothed)
  const headP = neckPts[neckPts.length - 1];
  const hx = headP.x + 12;
  const hy = headP.y - 2;
  c.fillStyle = '#7a6448';
  c.beginPath(); c.ellipse(hx, hy, 14, 7, 0.05, 0, Math.PI*2); c.fill();
  // Snout (rounded, blunt)
  c.beginPath(); c.ellipse(hx + 10, hy + 1, 7, 5, 0.05, 0, Math.PI*2); c.fill();
  // Mouth line (subtle, action opens it)
  const mouthOpen = action ? 4 : 0;
  c.fillStyle = '#3a2818';
  c.beginPath();
  c.moveTo(hx + 4, hy + 2);
  c.lineTo(hx + 16, hy + 2);
  c.lineTo(hx + 16, hy + 4 + mouthOpen);
  c.lineTo(hx + 4, hy + 3);
  c.closePath(); c.fill();
  // Peg teeth (front-only, small)
  if (action) {
    c.fillStyle = '#f0e8c0';
    for (let i = 0; i < 5; i++) {
      c.fillRect(hx + 10 + i * 1.2, hy + 2, 0.8, 2);
    }
  }
  // Eye (small, set forward)
  c.fillStyle = 'white';
  c.beginPath(); c.arc(hx + 2, hy - 2, 1.6, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(hx + 2.2, hy - 2, 0.9, 0, Math.PI*2); c.fill();
  // Nostril (high, near forehead - sauropods had nasal openings high on skull)
  c.fillStyle = 'black';
  c.beginPath(); c.arc(hx - 4, hy - 4, 1, 0, Math.PI*2); c.fill();
  // Skin texture dots
  c.fillStyle = 'rgba(50, 38, 22, 0.45)';
  for (let i = 0; i < 12; i++) {
    const dx = -36 + i * 7;
    const dy = -8 + Math.sin(i * 1.2) * 8;
    c.beginPath();
    c.arc(dx, dy, 1.4, 0, Math.PI*2);
    c.fill();
  }
  c.restore();
}

function drawCoelophysis(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Fast running motion
  const sprint = Math.sin(t * 0.4) * 4;
  const sprint2 = Math.sin(t * 0.4 + Math.PI) * 4;
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.beginPath(); c.ellipse(0, 52, 50, 5, 0, 0, Math.PI*2); c.fill();
  // Long whip tail (held high for balance)
  const tailWave = Math.sin(t * 0.25) * 5;
  c.fillStyle = '#a86848';
  c.beginPath();
  c.moveTo(-12, -8);
  c.quadraticCurveTo(-32, -22 + tailWave, -52, -10 + tailWave * 1.5);
  c.lineTo(-72, 0 + tailWave * 1.8);
  c.lineTo(-72, 4 + tailWave * 1.8);
  c.lineTo(-52, -4 + tailWave * 1.5);
  c.quadraticCurveTo(-32, -16 + tailWave, -12, 0);
  c.closePath(); c.fill();
  // Tail stripes
  c.fillStyle = '#7a4828';
  for (let i = 0; i < 5; i++) {
    const px = -16 - i * 11;
    const py = -10 - i * 1 + tailWave * (0.5 + i * 0.2);
    c.beginPath();
    c.ellipse(px, py, 2.5, 1.5, -0.15, 0, Math.PI*2); c.fill();
  }
  // Far back leg (thin, long, runner)
  c.fillStyle = '#8a4a30';
  c.beginPath();
  c.moveTo(-6, 4); c.lineTo(-12 + sprint, 26); c.lineTo(-4 + sprint, 44);
  c.lineTo(2 + sprint, 52); c.lineTo(6 + sprint, 44); c.lineTo(2, 28); c.lineTo(0, 12);
  c.closePath(); c.fill();
  // Far foot claws
  c.fillStyle = '#3a1a08';
  c.beginPath();
  c.moveTo(-2 + sprint, 52); c.lineTo(0 + sprint, 56); c.lineTo(3 + sprint, 52);
  c.closePath(); c.fill();
  // Body (slender, gracile)
  c.fillStyle = '#a86848';
  c.beginPath(); c.ellipse(0, -4, 26, 12, -0.1, 0, Math.PI*2); c.fill();
  // Belly counter-shading
  c.fillStyle = '#e8b890';
  c.beginPath(); c.ellipse(2, 6, 20, 4, 0, 0, Math.PI*2); c.fill();
  // Side stripe (theropod countershading)
  c.fillStyle = '#7a4828';
  c.beginPath(); c.ellipse(0, -2, 22, 2.5, -0.1, 0, Math.PI*2); c.fill();
  // Near back leg (thin, long, runner) - alternating with far leg
  c.fillStyle = '#a86848';
  c.beginPath();
  c.moveTo(0, 6); c.lineTo(-6 + sprint2, 28); c.lineTo(2 + sprint2, 46);
  c.lineTo(8 + sprint2, 52); c.lineTo(12 + sprint2, 46); c.lineTo(8, 30); c.lineTo(6, 14);
  c.closePath(); c.fill();
  // Near foot claws
  c.fillStyle = 'white';
  c.beginPath();
  c.moveTo(4 + sprint2, 52); c.lineTo(6 + sprint2, 56); c.lineTo(9 + sprint2, 52);
  c.closePath(); c.fill();
  c.beginPath();
  c.moveTo(7 + sprint2, 52); c.lineTo(9 + sprint2, 55); c.lineTo(11 + sprint2, 52);
  c.closePath(); c.fill();
  // Arms (slender, three-fingered, held forward)
  const armReach = action ? 8 : 0;
  c.fillStyle = '#8a4a30';
  c.beginPath();
  c.moveTo(8, 0); c.lineTo(18 + armReach, 8); c.lineTo(22 + armReach, 16);
  c.lineTo(18 + armReach, 18); c.lineTo(14 + armReach, 12); c.lineTo(6, 4);
  c.closePath(); c.fill();
  // Three claws on hand
  c.strokeStyle = 'white'; c.lineWidth = 1.4;
  c.beginPath(); c.moveTo(20 + armReach, 16); c.lineTo(26 + armReach, 14); c.stroke();
  c.beginPath(); c.moveTo(20 + armReach, 17); c.lineTo(26 + armReach, 18); c.stroke();
  c.beginPath(); c.moveTo(20 + armReach, 19); c.lineTo(25 + armReach, 22); c.stroke();
  // NECK (long, S-curved, held high)
  const neckPts = [];
  const neckSegs = 10;
  const neckLift = action ? -4 : 0;
  for (let i = 0; i <= neckSegs; i++) {
    const p = i / neckSegs;
    const cx = 14 + p * 22;
    const cy = -10 - Math.sin(p * Math.PI) * 14 - p * 8 + neckLift * p + Math.sin(t * 0.06 + p * 2) * 1;
    const thickness = 6 - p * 3;
    neckPts.push({ x: cx, y: cy, th: thickness });
  }
  c.fillStyle = '#a86848';
  c.beginPath();
  c.moveTo(neckPts[0].x, neckPts[0].y - neckPts[0].th);
  for (let i = 1; i < neckPts.length; i++) {
    c.lineTo(neckPts[i].x, neckPts[i].y - neckPts[i].th);
  }
  for (let i = neckPts.length - 1; i >= 0; i--) {
    c.lineTo(neckPts[i].x, neckPts[i].y + neckPts[i].th);
  }
  c.closePath(); c.fill();
  // Neck underside lighter
  c.fillStyle = '#e8b890';
  c.beginPath();
  c.moveTo(neckPts[0].x, neckPts[0].y);
  for (let i = 1; i < neckPts.length; i++) {
    c.lineTo(neckPts[i].x, neckPts[i].y + neckPts[i].th * 0.4);
  }
  for (let i = neckPts.length - 1; i >= 0; i--) {
    c.lineTo(neckPts[i].x, neckPts[i].y + neckPts[i].th);
  }
  c.closePath(); c.fill();
  // Head (small, narrow, elongated)
  const headP = neckPts[neckPts.length - 1];
  const hx = headP.x + 6;
  const hy = headP.y;
  c.fillStyle = '#a86848';
  c.beginPath(); c.ellipse(hx, hy, 14, 6, -0.05, 0, Math.PI*2); c.fill();
  // Snout (long and narrow)
  c.beginPath(); c.ellipse(hx + 10, hy + 1, 8, 4, 0.05, 0, Math.PI*2); c.fill();
  // Jaw (opens with action - many small teeth)
  const jawOpen = action ? 5 : 1;
  c.fillStyle = '#7a4828';
  c.beginPath();
  c.moveTo(hx - 4, hy + 1);
  c.lineTo(hx + 18, hy + 2);
  c.lineTo(hx + 18, hy + 3 + jawOpen);
  c.lineTo(hx - 4, hy + 3);
  c.closePath(); c.fill();
  // Many small needle-like teeth (Coelophysis had ~26 teeth)
  c.fillStyle = 'white';
  for (let i = 0; i < 9; i++) {
    c.beginPath();
    c.moveTo(hx - 2 + i * 2.4, hy + 1);
    c.lineTo(hx - 1.5 + i * 2.4, hy + 3);
    c.lineTo(hx - 1 + i * 2.4, hy + 1);
    c.closePath(); c.fill();
  }
  for (let i = 0; i < 8; i++) {
    c.beginPath();
    c.moveTo(hx - 1 + i * 2.5, hy + 3 + jawOpen);
    c.lineTo(hx - 0.5 + i * 2.5, hy + 1 + jawOpen);
    c.lineTo(hx + i * 2.5, hy + 3 + jawOpen);
    c.closePath(); c.fill();
  }
  // Distinctive subnarial notch (gap between premaxilla and maxilla teeth - signature feature)
  c.fillStyle = '#7a4828';
  c.fillRect(hx + 2, hy + 1, 1.5, 2.5);
  // Eye (large, set forward)
  c.fillStyle = '#f0d040';
  c.beginPath(); c.arc(hx - 2, hy - 1, 2, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.ellipse(hx - 1.5, hy - 1, 0.7, 1.6, 0, 0, Math.PI*2); c.fill();
  // Brow ridge
  c.fillStyle = '#7a4828';
  c.beginPath();
  c.moveTo(hx - 5, hy - 4); c.lineTo(hx + 1, hy - 3); c.lineTo(hx - 1, hy - 1);
  c.closePath(); c.fill();
  // Nostril
  c.fillStyle = 'black';
  c.beginPath(); c.arc(hx + 14, hy, 0.8, 0, Math.PI*2); c.fill();
  // Body stripes (theropod camouflage)
  c.fillStyle = 'rgba(60, 30, 15, 0.55)';
  for (let i = 0; i < 5; i++) {
    c.beginPath();
    c.ellipse(-12 + i * 6, -6 + Math.sin(i) * 3, 4, 1.5, 0.4, 0, Math.PI*2);
    c.fill();
  }
  // Speed lines when running fast
  if (Math.abs(sprint) > 2) {
    c.strokeStyle = 'rgba(255, 255, 255, 0.15)'; c.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      c.beginPath();
      c.moveTo(-30 - i * 4, 20 + i * 6);
      c.lineTo(-50 - i * 4, 20 + i * 6);
      c.stroke();
    }
  }
  c.restore();
}

function drawCeratosaurus(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  const stride = Math.sin(t * 0.18) * 3;
  // Headbutt lunge: when action, the whole upper body pitches forward
  const lunge = action || 0;
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.beginPath(); c.ellipse(0, 52, 70, 6, 0, 0, Math.PI*2); c.fill();
  // Tail (held high, thicker than allosaurus)
  const tailWave = Math.sin(t * 0.14) * 3;
  c.fillStyle = '#5a4838';
  c.beginPath();
  c.moveTo(-22, -2);
  c.quadraticCurveTo(-50, -16 + tailWave, -86, -8 + tailWave);
  c.lineTo(-96, -2 + tailWave);
  c.lineTo(-86, 6 + tailWave);
  c.quadraticCurveTo(-50, 12 + tailWave, -22, 18);
  c.closePath(); c.fill();
  // Far back leg
  c.fillStyle = '#3a2818';
  c.beginPath();
  c.moveTo(-12, 4); c.lineTo(-18 + stride, 28); c.lineTo(-8 + stride, 52);
  c.lineTo(8 + stride, 52); c.lineTo(6, 28); c.lineTo(2, 10);
  c.closePath(); c.fill();
  // Body (stockier than allosaurus, slightly shorter)
  c.fillStyle = '#5a4838';
  c.beginPath(); c.ellipse(2, -4, 38, 22, -0.08, 0, Math.PI*2); c.fill();
  // Belly
  c.fillStyle = '#a89070';
  c.beginPath(); c.ellipse(4, 14, 28, 7, 0, 0, Math.PI*2); c.fill();
  // OSTEODERM ROW (distinctive scutes down the back - signature ceratosaur feature)
  c.fillStyle = '#3a2410';
  for (let i = 0; i < 10; i++) {
    const sx = -22 + i * 6;
    const sy = -25 + Math.sin(i * 0.3) * 1;
    // Diamond-shaped scutes
    c.beginPath();
    c.moveTo(sx, sy - 5);
    c.lineTo(sx + 3, sy);
    c.lineTo(sx, sy + 2);
    c.lineTo(sx - 3, sy);
    c.closePath(); c.fill();
    // Highlight on each scute
    c.fillStyle = '#7a5028';
    c.beginPath();
    c.moveTo(sx - 2, sy - 1);
    c.lineTo(sx, sy - 4);
    c.lineTo(sx + 1, sy - 2);
    c.closePath(); c.fill();
    c.fillStyle = '#3a2410';
  }
  // Near back leg
  c.fillStyle = '#5a4838';
  c.beginPath();
  c.moveTo(-6, 6); c.lineTo(-10 - stride, 30); c.lineTo(0 - stride, 52);
  c.lineTo(16 - stride, 52); c.lineTo(14, 30); c.lineTo(8, 12);
  c.closePath(); c.fill();
  // Foot claws (4-toed - actually ceratosaurids retained 4 toes)
  c.fillStyle = 'white';
  [[-2 - stride, 52], [4 - stride, 52], [10 - stride, 52], [14 - stride, 52]].forEach(([fx, fy]) => {
    c.beginPath();
    c.moveTo(fx, fy); c.lineTo(fx + 2, fy + 4); c.lineTo(fx + 4, fy);
    c.closePath(); c.fill();
  });
  // Arms (small, four-fingered - ceratosaur retained 4th digit)
  c.fillStyle = '#3a2818';
  c.beginPath();
  c.moveTo(20, 6); c.lineTo(28, 14); c.lineTo(30, 22);
  c.lineTo(26, 24); c.lineTo(22, 16); c.lineTo(16, 8);
  c.closePath(); c.fill();
  // Four claws
  c.strokeStyle = 'white'; c.lineWidth = 1.4;
  c.beginPath(); c.moveTo(28, 22); c.lineTo(32, 19); c.stroke();
  c.beginPath(); c.moveTo(28, 23); c.lineTo(33, 23); c.stroke();
  c.beginPath(); c.moveTo(28, 25); c.lineTo(33, 26); c.stroke();
  c.beginPath(); c.moveTo(27, 27); c.lineTo(31, 30); c.stroke();
  // HEAD (the showpiece - lunges forward on action)
  c.save();
  c.translate(lunge * 14, lunge * 4);
  // Head body
  c.fillStyle = '#6a5440';
  c.beginPath(); c.ellipse(36, -28, 22, 14, -0.08, 0, Math.PI*2); c.fill();
  // Snout
  c.beginPath(); c.ellipse(54, -23, 14, 9, 0, 0, Math.PI*2); c.fill();
  // Jaw (opens with action)
  const jawOpen = lunge * 10 + 2;
  c.fillStyle = '#4a3828';
  c.beginPath();
  c.moveTo(20, -22);
  c.lineTo(66, -19 + jawOpen * 0.2);
  c.lineTo(66, -14 + jawOpen);
  c.lineTo(20, -12);
  c.closePath(); c.fill();
  // Mouth interior
  if (action) {
    c.fillStyle = '#3a0010';
    c.beginPath();
    c.moveTo(26, -20); c.lineTo(62, -18 + jawOpen * 0.2);
    c.lineTo(62, -15 + jawOpen); c.lineTo(26, -14);
    c.closePath(); c.fill();
  }
  // Long teeth (Ceratosaurus had unusually long, blade-like teeth)
  c.fillStyle = 'white';
  for (let i = 0; i < 8; i++) {
    c.beginPath();
    c.moveTo(24 + i * 5, -22);
    c.lineTo(26 + i * 5, -10);  // longer teeth than other theropods
    c.lineTo(28 + i * 5, -22);
    c.closePath(); c.fill();
  }
  // Lower teeth
  for (let i = 0; i < 7; i++) {
    c.beginPath();
    c.moveTo(26 + i * 5.5, -12 + jawOpen);
    c.lineTo(28 + i * 5.5, -22 + jawOpen);
    c.lineTo(30 + i * 5.5, -12 + jawOpen);
    c.closePath(); c.fill();
  }
  // SIGNATURE NASAL HORN (the "ceras" - large blade-like horn on snout)
  c.fillStyle = '#8a6a40';
  c.beginPath();
  c.moveTo(46, -32);
  c.quadraticCurveTo(50, -50, 56, -52);
  c.quadraticCurveTo(58, -42, 56, -32);
  c.closePath(); c.fill();
  // Horn shading
  c.fillStyle = '#5a3a18';
  c.beginPath();
  c.moveTo(48, -32);
  c.quadraticCurveTo(50, -46, 53, -50);
  c.quadraticCurveTo(54, -42, 53, -32);
  c.closePath(); c.fill();
  // Horn ridges
  c.strokeStyle = '#3a2008'; c.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    c.beginPath();
    c.moveTo(48 + i * 1.5, -36 - i * 4);
    c.lineTo(54 - i * 0.5, -38 - i * 4);
    c.stroke();
  }
  // Brow horns (smaller pair above eyes)
  c.fillStyle = '#8a6a40';
  c.beginPath();
  c.moveTo(28, -38);
  c.lineTo(30, -48);
  c.lineTo(34, -38);
  c.closePath(); c.fill();
  c.fillStyle = '#5a3a18';
  c.beginPath();
  c.moveTo(29, -38); c.lineTo(30.5, -46); c.lineTo(32, -38);
  c.closePath(); c.fill();
  // Second brow horn
  c.fillStyle = '#8a6a40';
  c.beginPath();
  c.moveTo(38, -40);
  c.lineTo(40, -49);
  c.lineTo(44, -40);
  c.closePath(); c.fill();
  c.fillStyle = '#5a3a18';
  c.beginPath();
  c.moveTo(39, -40); c.lineTo(40.5, -47); c.lineTo(42, -40);
  c.closePath(); c.fill();
  // Eye (set forward, fierce)
  c.fillStyle = '#cc4422';
  c.beginPath(); c.arc(34, -32, 3, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.ellipse(35, -32, 1.1, 2.3, 0, 0, Math.PI*2); c.fill();
  // Nostril (in front of horn)
  c.fillStyle = 'black';
  c.beginPath(); c.arc(60, -26, 1.4, 0, Math.PI*2); c.fill();
  // Headbutt impact lines
  if (lunge > 0.4) {
    c.strokeStyle = 'rgba(255, 220, 180, 0.8)'; c.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const a = -0.4 + i * 0.4;
      c.beginPath();
      c.moveTo(60 + Math.cos(a) * 8, -50 + Math.sin(a) * 4);
      c.lineTo(60 + Math.cos(a) * 16, -50 + Math.sin(a) * 8);
      c.stroke();
    }
  }
  c.restore();
  // Skin texture
  c.fillStyle = 'rgba(40, 28, 16, 0.5)';
  for (let i = 0; i < 5; i++) {
    c.beginPath();
    c.ellipse(-12 + i * 10, -10 + Math.sin(i) * 4, 7, 2, 0.3, 0, Math.PI*2);
    c.fill();
  }
  c.restore();
}

function drawCarnotaurus(c, x, y, s, dir, action, t) {
  c.save(); c.translate(x, y); c.scale(dir * s, s);
  // Fast sprinting motion (Carnotaurus was built for speed)
  const sprint = Math.sin(t * 0.3) * 4;
  // Head shake on action (lateral whip)
  const shake = action ? Math.sin(t * 1.2) * 8 : 0;
  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.32)';
  c.beginPath(); c.ellipse(0, 52, 75, 7, 0, 0, Math.PI*2); c.fill();
  // Tail (long, muscular, held high for balance)
  const tailWave = Math.sin(t * 0.2) * 4;
  c.fillStyle = '#7a3a28';
  c.beginPath();
  c.moveTo(-22, -2);
  c.quadraticCurveTo(-50, -18 + tailWave, -88, -10 + tailWave);
  c.lineTo(-100, -4 + tailWave);
  c.lineTo(-88, 6 + tailWave);
  c.quadraticCurveTo(-50, 14 + tailWave, -22, 18);
  c.closePath(); c.fill();
  // Tail muscles (caudofemoralis - massive in carnotaurus)
  c.fillStyle = '#5a2818';
  c.beginPath(); c.ellipse(-30, 2 + tailWave * 0.4, 16, 8, -0.1, 0, Math.PI*2); c.fill();
  // Far back leg
  c.fillStyle = '#5a2818';
  c.beginPath();
  c.moveTo(-10, 4); c.lineTo(-16 + sprint, 26); c.lineTo(-6 + sprint, 46);
  c.lineTo(0 + sprint, 52); c.lineTo(6 + sprint, 46); c.lineTo(2, 28); c.lineTo(0, 10);
  c.closePath(); c.fill();
  // Body (deep, muscular)
  c.fillStyle = '#7a3a28';
  c.beginPath(); c.ellipse(2, -4, 38, 22, -0.05, 0, Math.PI*2); c.fill();
  // Belly
  c.fillStyle = '#c08070';
  c.beginPath(); c.ellipse(4, 14, 28, 7, 0, 0, Math.PI*2); c.fill();
  // Side stripe (theropod countershading)
  c.fillStyle = '#5a2818';
  c.beginPath(); c.ellipse(2, 0, 32, 3, -0.05, 0, Math.PI*2); c.fill();
  // Rows of larger osteoderms (Carnotaurus had distinctive bumps in rows)
  c.fillStyle = '#3a1810';
  // Top row
  for (let i = 0; i < 8; i++) {
    c.beginPath();
    c.arc(-20 + i * 6, -22, 2.5, 0, Math.PI*2); c.fill();
  }
  // Middle row (offset)
  c.fillStyle = '#5a2818';
  for (let i = 0; i < 7; i++) {
    c.beginPath();
    c.arc(-16 + i * 6, -10, 2, 0, Math.PI*2); c.fill();
  }
  // Highlight bumps
  c.fillStyle = '#9a5040';
  for (let i = 0; i < 8; i++) {
    c.beginPath();
    c.arc(-21 + i * 6, -23, 1, 0, Math.PI*2); c.fill();
  }
  // Near back leg (powerful, longer)
  c.fillStyle = '#7a3a28';
  c.beginPath();
  c.moveTo(-2, 6); c.lineTo(-8 - sprint, 28); c.lineTo(2 - sprint, 48);
  c.lineTo(10 - sprint, 52); c.lineTo(16 - sprint, 48); c.lineTo(14, 30); c.lineTo(8, 12);
  c.closePath(); c.fill();
  // Thigh muscle bulge
  c.fillStyle = '#5a2818';
  c.beginPath(); c.ellipse(2, 16, 10, 8, 0.1, 0, Math.PI*2); c.fill();
  // Foot claws
  c.fillStyle = 'white';
  [[-2 - sprint, 52], [4 - sprint, 52], [10 - sprint, 52], [14 - sprint, 52]].forEach(([fx, fy]) => {
    c.beginPath();
    c.moveTo(fx, fy); c.lineTo(fx + 2, fy + 5); c.lineTo(fx + 5, fy);
    c.closePath(); c.fill();
  });
  // ABSURDLY TINY ARMS (Carnotaurus's signature - smaller than T. rex's)
  c.fillStyle = '#5a2818';
  // Two stubby vestigial arms
  c.beginPath();
  c.ellipse(20, 6, 4, 2, 0.2, 0, Math.PI*2); c.fill();
  c.beginPath();
  c.ellipse(20, 12, 4, 2, 0.3, 0, Math.PI*2); c.fill();
  // Tiny non-functional fingers
  c.strokeStyle = 'rgba(255,255,255,0.5)'; c.lineWidth = 0.8;
  c.beginPath(); c.moveTo(23, 6); c.lineTo(25, 5); c.stroke();
  c.beginPath(); c.moveTo(23, 7); c.lineTo(25, 8); c.stroke();
  c.beginPath(); c.moveTo(23, 12); c.lineTo(25, 11); c.stroke();
  c.beginPath(); c.moveTo(23, 13); c.lineTo(25, 14); c.stroke();
  // HEAD (deep, short, bull-like - shaken laterally on action)
  c.save();
  c.translate(0, 0);
  c.rotate(shake * 0.04);
  // Head body (deep and short)
  c.fillStyle = '#8a4030';
  c.beginPath(); c.ellipse(36, -28, 18, 18, -0.05, 0, Math.PI*2); c.fill();
  // Snout (short, bulldog-like)
  c.beginPath(); c.ellipse(50, -22, 12, 11, 0, 0, Math.PI*2); c.fill();
  // Jaw (opens slightly with action)
  const jawOpen = action ? 5 : 1;
  c.fillStyle = '#5a2818';
  c.beginPath();
  c.moveTo(22, -22);
  c.lineTo(60, -19 + jawOpen * 0.2);
  c.lineTo(60, -13 + jawOpen);
  c.lineTo(22, -10);
  c.closePath(); c.fill();
  // Teeth
  c.fillStyle = 'white';
  for (let i = 0; i < 7; i++) {
    c.beginPath();
    c.moveTo(26 + i * 5, -22);
    c.lineTo(28 + i * 5, -14);
    c.lineTo(30 + i * 5, -22);
    c.closePath(); c.fill();
  }
  for (let i = 0; i < 6; i++) {
    c.beginPath();
    c.moveTo(28 + i * 5, -10 + jawOpen);
    c.lineTo(30 + i * 5, -18 + jawOpen);
    c.lineTo(32 + i * 5, -10 + jawOpen);
    c.closePath(); c.fill();
  }
  // SIGNATURE BULL HORNS (large, lateral, above eyes)
  // Left/back horn
  c.fillStyle = '#a08068';
  c.beginPath();
  c.moveTo(28, -42);
  c.quadraticCurveTo(18, -54, 8, -50);
  c.quadraticCurveTo(14, -42, 26, -38);
  c.closePath(); c.fill();
  // Horn shading
  c.fillStyle = '#604838';
  c.beginPath();
  c.moveTo(28, -42);
  c.quadraticCurveTo(20, -50, 12, -49);
  c.quadraticCurveTo(18, -44, 26, -40);
  c.closePath(); c.fill();
  // Horn ridges
  c.strokeStyle = '#3a2818'; c.lineWidth = 0.8;
  for (let i = 0; i < 3; i++) {
    c.beginPath();
    c.arc(20 - i * 3, -45 - i, 1.5, 0, Math.PI);
    c.stroke();
  }
  // Right/front horn (more visible)
  c.fillStyle = '#a08068';
  c.beginPath();
  c.moveTo(40, -42);
  c.quadraticCurveTo(50, -56, 60, -50);
  c.quadraticCurveTo(54, -42, 42, -38);
  c.closePath(); c.fill();
  c.fillStyle = '#604838';
  c.beginPath();
  c.moveTo(40, -42);
  c.quadraticCurveTo(48, -52, 56, -49);
  c.quadraticCurveTo(50, -44, 42, -40);
  c.closePath(); c.fill();
  c.strokeStyle = '#3a2818'; c.lineWidth = 0.8;
  for (let i = 0; i < 3; i++) {
    c.beginPath();
    c.arc(48 + i * 3, -45 - i, 1.5, 0, Math.PI);
    c.stroke();
  }
  // Horn highlights
  c.fillStyle = '#d8c0a0';
  c.beginPath();
  c.moveTo(54, -50); c.lineTo(58, -50); c.lineTo(56, -47);
  c.closePath(); c.fill();
  c.beginPath();
  c.moveTo(8, -50); c.lineTo(12, -50); c.lineTo(10, -47);
  c.closePath(); c.fill();
  // Eye (binocular vision - eyes face slightly forward)
  c.fillStyle = '#cc8822';
  c.beginPath(); c.arc(36, -32, 3, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.ellipse(37, -32, 1.2, 2.4, 0, 0, Math.PI*2); c.fill();
  // Heavy brow ridge between horns
  c.fillStyle = '#5a2818';
  c.beginPath();
  c.moveTo(28, -38); c.lineTo(36, -34); c.lineTo(44, -38); c.lineTo(42, -36); c.lineTo(36, -32); c.lineTo(30, -36);
  c.closePath(); c.fill();
  // Nostril
  c.fillStyle = 'black';
  c.beginPath(); c.arc(58, -22, 1.6, 0, Math.PI*2); c.fill();
  // Head shake motion blur lines
  if (action) {
    c.strokeStyle = 'rgba(255, 200, 180, 0.5)'; c.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      c.beginPath();
      c.moveTo(8 - i * 2, -50 + i * 2);
      c.lineTo(2 - i * 2, -50 + i * 2);
      c.stroke();
      c.beginPath();
      c.moveTo(60 + i * 2, -50 + i * 2);
      c.lineTo(66 + i * 2, -50 + i * 2);
      c.stroke();
    }
  }
  c.restore();
  // Sprint dust at feet
  if (Math.abs(sprint) > 2) {
    c.fillStyle = 'rgba(140, 100, 70, 0.4)';
    for (let i = 0; i < 3; i++) {
      c.beginPath();
      c.arc(-15 - i * 6, 50, 3 + i, 0, Math.PI*2); c.fill();
    }
  }
  c.restore();
}

// ---------- FOOD ITEM DRAWINGS ----------

function drawFly(c, item, t) {
  const flutter = Math.sin(t * 0.4 + item.x * 0.05) * 3;
  c.save(); c.translate(item.x, item.y + flutter);
  c.fillStyle = 'rgba(240, 240, 255, 0.7)';
  c.beginPath(); c.ellipse(-3, -3, 5, 2.5, 0.3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(3, -3, 5, 2.5, -0.3, 0, Math.PI*2); c.fill();
  c.fillStyle = '#222';
  c.beginPath(); c.ellipse(0, 0, 5, 3, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = '#ff2222';
  c.beginPath(); c.arc(-3, -1, 1.5, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawMouse(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const hop = Math.abs(Math.sin(t * 0.15)) * 3;
  c.translate(0, -hop);
  c.fillStyle = '#b09878';
  c.beginPath(); c.ellipse(0, 0, 11, 6, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(-9, -2, 5, 4, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = '#d8b898';
  c.beginPath(); c.arc(-11, -5, 2.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(-8, -6, 2.2, 0, Math.PI*2); c.fill();
  c.strokeStyle = '#b09878'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(8, 0); c.quadraticCurveTo(14, -4, 20, 2); c.stroke();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(-11, -3, 0.8, 0, Math.PI*2); c.fill();
  c.fillStyle = '#ff88aa';
  c.beginPath(); c.arc(-13, -1, 0.6, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawJellyfish(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  c.fillStyle = 'rgba(255, 140, 200, 0.8)';
  c.beginPath(); c.arc(0, 0, 13, Math.PI, 0); c.fill();
  c.fillStyle = 'rgba(255, 180, 220, 0.6)';
  c.beginPath(); c.ellipse(0, -3, 10, 4, 0, 0, Math.PI*2); c.fill();
  c.strokeStyle = 'rgba(255, 140, 200, 0.7)'; c.lineWidth = 1.8;
  for (let i = -2; i <= 2; i++) {
    c.beginPath();
    c.moveTo(i * 4, 0);
    c.quadraticCurveTo(i*4 + Math.sin(t * 0.15 + i)*3, 10, i*4 + Math.sin(t * 0.15 + i)*4, 22);
    c.stroke();
  }
  c.restore();
}

function drawFish(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const wiggle = Math.sin(t * 0.2) * 3;
  c.fillStyle = item.color;
  c.beginPath(); c.ellipse(0, 0, 13, 7, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = item.color;
  c.beginPath();
  c.moveTo(10, 0); c.lineTo(20, -6 + wiggle); c.lineTo(20, 6 + wiggle);
  c.closePath(); c.fill();
  c.fillStyle = 'rgba(255,255,255,0.4)';
  c.beginPath(); c.ellipse(-3, -2, 8, 3, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = 'white';
  c.beginPath(); c.arc(-7, -1, 2.5, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(-8, -1, 1.2, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawFruit(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  c.fillStyle = '#d83322';
  c.beginPath(); c.arc(0, 0, 9, 0, Math.PI*2); c.fill();
  c.fillStyle = '#ff6644';
  c.beginPath(); c.arc(-3, -3, 4, 0, Math.PI*2); c.fill();
  c.fillStyle = '#4a6a20';
  c.fillRect(-1, -12, 2, 5);
  c.beginPath(); c.ellipse(4, -10, 4, 2, 0.3, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawLeaves(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  c.rotate(Math.sin(t * 0.05) * 0.15);
  c.fillStyle = '#3a8a3a';
  c.beginPath(); c.ellipse(0, 0, 10, 6, 0.3, 0, Math.PI*2); c.fill();
  c.fillStyle = '#4a9a4a';
  c.beginPath(); c.ellipse(-4, 4, 8, 5, -0.3, 0, Math.PI*2); c.fill();
  c.fillStyle = '#2a6a2a';
  c.beginPath(); c.ellipse(5, -3, 7, 4, 0.5, 0, Math.PI*2); c.fill();
  c.strokeStyle = '#1a4a1a'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(-8, 0); c.lineTo(8, 0); c.stroke();
  c.restore();
}

function drawPrey(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const run = Math.sin(t * 0.3) * 2;
  c.translate(0, -Math.abs(run));
  c.fillStyle = '#c09470';
  c.beginPath(); c.ellipse(0, 0, 13, 5, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(-11, -1, 5, 4, 0, 0, Math.PI*2); c.fill();
  c.beginPath();
  c.moveTo(11, 0); c.lineTo(22, 1); c.lineTo(11, 3); c.closePath(); c.fill();
  c.fillStyle = '#a07450';
  c.fillRect(-6, 3, 2, 4 + run);
  c.fillRect(4, 3, 2, 4 - run);
  c.fillStyle = '#ffcc33';
  c.beginPath(); c.arc(-12, -2, 1, 0, Math.PI*2); c.fill();
  c.fillStyle = '#6a4428';
  c.beginPath(); c.arc(-4, -3, 1, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(2, -3, 1, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawSmallDino(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const bob = Math.sin(t * 0.2) * 2;
  c.translate(0, bob);
  c.fillStyle = '#8a6234';
  c.beginPath(); c.ellipse(0, 0, 18, 10, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(-15, -5, 9, 7, 0, 0, Math.PI*2); c.fill();
  c.beginPath();
  c.moveTo(15, -2); c.lineTo(30, 0); c.lineTo(15, 4); c.closePath(); c.fill();
  c.fillStyle = '#6a4624';
  c.fillRect(-8, 8, 4, 10);
  c.fillRect(6, 8, 4, 10);
  c.fillStyle = '#5a3a1c';
  for (let i = 0; i < 3; i++) {
    c.beginPath();
    c.moveTo(-8 + i * 8, -10);
    c.lineTo(-6 + i * 8, -14);
    c.lineTo(-4 + i * 8, -10);
    c.closePath(); c.fill();
  }
  c.fillStyle = '#ffcc33';
  c.beginPath(); c.arc(-17, -6, 1.3, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(-17, -6, 0.7, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawFern(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const sway = Math.sin(t * 0.06 + item.x * 0.01) * 2;
  // Stem
  c.strokeStyle = '#3a5a28'; c.lineWidth = 2.5;
  c.beginPath();
  c.moveTo(0, 18);
  c.quadraticCurveTo(sway * 0.5, 0, sway, -18);
  c.stroke();
  // Leaflets (bipinnate look)
  c.fillStyle = '#4a8a38';
  for (let i = 0; i < 6; i++) {
    const fy = -15 + i * 7;
    const fs = Math.max(3, 13 - i * 1.8);
    const off = sway * (1 - i * 0.1);
    c.beginPath();
    c.ellipse(off - fs * 0.5, fy, fs * 0.5, 2.5, -0.35, 0, Math.PI*2);
    c.fill();
    c.beginPath();
    c.ellipse(off + fs * 0.5, fy, fs * 0.5, 2.5, 0.35, 0, Math.PI*2);
    c.fill();
  }
  // Tip coil
  c.fillStyle = '#5a9a48';
  c.beginPath();
  c.arc(sway, -20, 3, 0, Math.PI*2);
  c.fill();
  c.strokeStyle = '#2a5a28'; c.lineWidth = 1;
  c.beginPath();
  c.arc(sway, -20, 2, 0, Math.PI * 1.5);
  c.stroke();
  c.restore();
}

function drawBigFish(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const swim = Math.sin(t * 0.12 + item.x * 0.01) * 3;
  c.translate(0, swim);
  // Body (lobefin / sarcopterygian)
  c.fillStyle = '#4a6878';
  c.beginPath(); c.ellipse(0, 0, 24, 11, 0, 0, Math.PI*2); c.fill();
  // Belly lighter
  c.fillStyle = '#88b0c0';
  c.beginPath(); c.ellipse(0, 4, 20, 5, 0, 0, Math.PI*2); c.fill();
  // Tail fin (tri-lobed)
  c.fillStyle = '#3a5868';
  c.beginPath();
  c.moveTo(22, -2); c.lineTo(36, -10); c.lineTo(32, -2);
  c.lineTo(38, 0); c.lineTo(32, 3); c.lineTo(36, 10); c.lineTo(22, 4);
  c.closePath(); c.fill();
  // Lobe pectoral fins
  c.beginPath(); c.ellipse(-2, 10, 6, 3, 0.4, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(10, 10, 5, 3, -0.3, 0, Math.PI*2); c.fill();
  // Dorsal fins
  c.beginPath(); c.ellipse(-4, -10, 5, 4, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(10, -9, 6, 4, 0, 0, Math.PI*2); c.fill();
  // Scale spots
  c.fillStyle = '#2a485a';
  [[-10, -3], [-2, -3], [6, -2], [14, -1], [-6, 3], [4, 4], [12, 3]].forEach(([dx, dy]) => {
    c.beginPath(); c.arc(dx, dy, 1.3, 0, Math.PI*2); c.fill();
  });
  // Gill line
  c.strokeStyle = '#2a485a'; c.lineWidth = 1;
  c.beginPath();
  c.moveTo(-12, -6); c.quadraticCurveTo(-14, 0, -12, 6);
  c.stroke();
  // Eye
  c.fillStyle = 'white';
  c.beginPath(); c.arc(-16, -2, 2.6, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(-16, -2, 1.3, 0, Math.PI*2); c.fill();
  // Mouth
  c.strokeStyle = 'black'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(-22, 2); c.lineTo(-18, 4); c.stroke();
  c.restore();
}

function drawOrnithopod(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const hop = Math.abs(Math.sin(t * 0.25)) * 3;
  c.translate(0, -hop);
  // Tail
  c.fillStyle = '#7aa078';
  c.beginPath();
  c.moveTo(-10, -2);
  c.quadraticCurveTo(-22, -6, -30, 0);
  c.lineTo(-30, 3);
  c.quadraticCurveTo(-22, 2, -10, 4);
  c.closePath(); c.fill();
  // Body
  c.beginPath(); c.ellipse(-2, 0, 14, 8, -0.1, 0, Math.PI*2); c.fill();
  // Belly lighter
  c.fillStyle = '#b8d8a8';
  c.beginPath(); c.ellipse(-2, 5, 10, 3, 0, 0, Math.PI*2); c.fill();
  // Head
  c.fillStyle = '#7aa078';
  c.beginPath(); c.ellipse(10, -4, 8, 6, -0.1, 0, Math.PI*2); c.fill();
  // Duck beak
  c.fillStyle = '#5a7858';
  c.beginPath();
  c.moveTo(15, -3); c.lineTo(21, -2); c.lineTo(21, 0); c.lineTo(15, 1);
  c.closePath(); c.fill();
  // Legs (hopping)
  c.fillStyle = '#5a7858';
  c.fillRect(-6, 5, 3, 6 + hop);
  c.fillRect(2, 5, 3, 6 - hop);
  // Stripes on back
  c.fillStyle = '#5a7858';
  for (let i = 0; i < 3; i++) {
    c.beginPath();
    c.ellipse(-6 + i * 5, -5, 2, 1.2, 0.2, 0, Math.PI*2);
    c.fill();
  }
  // Eye
  c.fillStyle = 'black';
  c.beginPath(); c.arc(12, -5, 1, 0, Math.PI*2); c.fill();
  c.fillStyle = 'white';
  c.beginPath(); c.arc(12.5, -5.3, 0.4, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawAmmonite(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const drift = Math.sin(t * 0.08 + item.x * 0.02) * 2;
  c.translate(0, drift);
  // Tentacles trailing behind (to the right since shell faces left)
  c.strokeStyle = 'rgba(200, 130, 80, 0.85)'; c.lineWidth = 1.5;
  for (let i = 0; i < 6; i++) {
    const ty = -5 + i * 2;
    const wiggle = Math.sin(t * 0.15 + i) * 3;
    c.beginPath();
    c.moveTo(10, ty);
    c.quadraticCurveTo(16 + wiggle, ty + 1, 22 + wiggle, ty + wiggle * 0.5);
    c.stroke();
  }
  // Shell outer
  c.fillStyle = '#c8a06a';
  c.beginPath(); c.arc(0, 0, 14, 0, Math.PI*2); c.fill();
  // Shell inner (darker, spiral)
  c.fillStyle = '#8a6438';
  c.beginPath(); c.arc(-2, -1, 10, 0, Math.PI*2); c.fill();
  c.fillStyle = '#c8a06a';
  c.beginPath(); c.arc(-3, -2, 6, 0, Math.PI*2); c.fill();
  c.fillStyle = '#8a6438';
  c.beginPath(); c.arc(-3.5, -2.5, 3, 0, Math.PI*2); c.fill();
  // Ribs on shell (outer whorl)
  c.strokeStyle = '#6a4828'; c.lineWidth = 1.2;
  for (let i = 0; i < 10; i++) {
    const ang = i * (Math.PI * 2 / 10);
    const r1 = 10, r2 = 14;
    c.beginPath();
    c.moveTo(Math.cos(ang) * r1, Math.sin(ang) * r1);
    c.lineTo(Math.cos(ang) * r2, Math.sin(ang) * r2);
    c.stroke();
  }
  // Shell opening / aperture where body pokes out
  c.fillStyle = '#5a3a20';
  c.beginPath();
  c.ellipse(10, 0, 4, 5, 0, 0, Math.PI*2); c.fill();
  // Eye peeking from shell
  c.fillStyle = '#ffcc44';
  c.beginPath(); c.arc(11, -1, 1.4, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.arc(11, -1, 0.6, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawBelemnite(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const jet = Math.sin(t * 0.2 + item.x * 0.03) * 2;
  c.translate(0, jet);
  // Pointed rostrum (bullet-shaped back)
  c.fillStyle = '#6a4a78';
  c.beginPath();
  c.moveTo(-18, 0);
  c.lineTo(-4, -4);
  c.lineTo(-4, 4);
  c.closePath(); c.fill();
  // Body / mantle (torpedo shape)
  c.fillStyle = '#a878b8';
  c.beginPath(); c.ellipse(2, 0, 12, 5, 0, 0, Math.PI*2); c.fill();
  // Mantle highlight
  c.fillStyle = '#c8a0d8';
  c.beginPath(); c.ellipse(2, -2, 10, 1.5, 0, 0, Math.PI*2); c.fill();
  // Lateral fins (two small triangular fins)
  c.fillStyle = '#8a5898';
  c.beginPath();
  c.moveTo(-6, -5); c.lineTo(-2, -9); c.lineTo(2, -5);
  c.closePath(); c.fill();
  c.beginPath();
  c.moveTo(-6, 5); c.lineTo(-2, 9); c.lineTo(2, 5);
  c.closePath(); c.fill();
  // Head (blunt front)
  c.fillStyle = '#b888c8';
  c.beginPath(); c.ellipse(12, 0, 4, 4, 0, 0, Math.PI*2); c.fill();
  // Tentacles (10 short arms)
  c.strokeStyle = '#8a5898'; c.lineWidth = 1.3;
  for (let i = 0; i < 8; i++) {
    const ang = -0.9 + i * 0.25;
    const wiggle = Math.sin(t * 0.2 + i) * 1.5;
    const tipX = 14 + Math.cos(ang) * 8;
    const tipY = Math.sin(ang) * 5 + wiggle;
    c.beginPath();
    c.moveTo(13, Math.sin(ang) * 3);
    c.quadraticCurveTo(15 + wiggle * 0.5, (Math.sin(ang) * 4 + tipY) / 2, tipX, tipY);
    c.stroke();
  }
  // Eye (large cephalopod eye)
  c.fillStyle = '#f0e8c0';
  c.beginPath(); c.arc(10, -1, 2, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath();
  c.ellipse(10.5, -1, 0.6, 1.4, 0, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawConiferBranch(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  const sway = Math.sin(t * 0.05 + item.x * 0.01) * 2;
  c.rotate(sway * 0.04);
  // Branch
  c.strokeStyle = '#5a3818'; c.lineWidth = 3;
  c.beginPath();
  c.moveTo(-22, 6); c.lineTo(20, -2); c.stroke();
  // Needles in tufts along branch
  c.strokeStyle = '#3a6a28'; c.lineWidth = 1.2;
  for (let i = 0; i < 7; i++) {
    const bx = -18 + i * 6;
    const by = 4 - i * 0.8;
    // Needles spreading out
    for (let j = -3; j <= 3; j++) {
      const ang = j * 0.18;
      c.beginPath();
      c.moveTo(bx, by);
      c.lineTo(bx + Math.cos(ang - 0.3) * 7, by + Math.sin(ang - 0.3) * 7 - 4);
      c.stroke();
    }
  }
  // Pine cone at one end
  c.fillStyle = '#7a4828';
  c.beginPath(); c.ellipse(-22, 6, 5, 7, 0.3, 0, Math.PI*2); c.fill();
  // Cone scales
  c.fillStyle = '#5a3018';
  for (let i = 0; i < 5; i++) {
    c.beginPath();
    c.arc(-23 + (i % 2) * 2, 2 + i * 2, 1.5, 0, Math.PI*2);
    c.fill();
  }
  // Small berry / fruit at other end
  c.fillStyle = '#a83838';
  c.beginPath(); c.arc(20, -2, 2.5, 0, Math.PI*2); c.fill();
  c.fillStyle = '#c85858';
  c.beginPath(); c.arc(19, -3, 1, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawCynodont(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  // Scuttling motion
  const scuttle = Math.abs(Math.sin(t * 0.4)) * 2;
  c.translate(0, -scuttle);
  // Tail (thin, ratlike)
  c.strokeStyle = '#7a5838'; c.lineWidth = 1.8;
  c.beginPath();
  c.moveTo(-10, 1);
  c.quadraticCurveTo(-18, -1, -22, -3 + Math.sin(t * 0.4) * 2);
  c.stroke();
  // Body (small, furry-looking)
  c.fillStyle = '#9a7050';
  c.beginPath(); c.ellipse(-2, 0, 11, 5, -0.05, 0, Math.PI*2); c.fill();
  // Lighter belly
  c.fillStyle = '#c8a080';
  c.beginPath(); c.ellipse(-2, 3, 8, 2, 0, 0, Math.PI*2); c.fill();
  // Fur texture (small dashes)
  c.strokeStyle = '#6a4830'; c.lineWidth = 0.6;
  for (let i = 0; i < 8; i++) {
    const fx = -10 + i * 2.5;
    const fy = -3 + Math.sin(i) * 2;
    c.beginPath();
    c.moveTo(fx, fy); c.lineTo(fx + 1, fy - 1.5);
    c.stroke();
  }
  // Head (rounded with snout)
  c.fillStyle = '#9a7050';
  c.beginPath(); c.ellipse(8, -1, 6, 4, 0.05, 0, Math.PI*2); c.fill();
  // Snout
  c.beginPath(); c.ellipse(13, 0, 3, 2.5, 0, 0, Math.PI*2); c.fill();
  // Two small canine teeth (cynodonts had differentiated teeth)
  c.fillStyle = 'white';
  c.fillRect(13, 1.5, 0.6, 1.5);
  c.fillRect(14.5, 1.5, 0.6, 1.5);
  // Whiskers
  c.strokeStyle = 'rgba(80, 60, 40, 0.7)'; c.lineWidth = 0.5;
  c.beginPath(); c.moveTo(15, 0); c.lineTo(20, -1); c.stroke();
  c.beginPath(); c.moveTo(15, 1); c.lineTo(20, 2); c.stroke();
  // Ear (small mammal-like)
  c.fillStyle = '#7a5838';
  c.beginPath(); c.ellipse(5, -4, 2, 2.5, -0.2, 0, Math.PI*2); c.fill();
  // Eye
  c.fillStyle = 'black';
  c.beginPath(); c.arc(10, -2, 0.9, 0, Math.PI*2); c.fill();
  c.fillStyle = 'white';
  c.beginPath(); c.arc(10.3, -2.2, 0.4, 0, Math.PI*2); c.fill();
  // Nose
  c.fillStyle = 'black';
  c.beginPath(); c.arc(15, 0, 0.6, 0, Math.PI*2); c.fill();
  // Legs (4 small legs)
  c.fillStyle = '#7a5838';
  c.fillRect(-6, 4, 1.5, 3 + Math.sin(t * 0.4) * 1);
  c.fillRect(-2, 4, 1.5, 3 - Math.sin(t * 0.4) * 1);
  c.fillRect(2, 4, 1.5, 3 + Math.sin(t * 0.4 + 1) * 1);
  c.fillRect(6, 4, 1.5, 3 - Math.sin(t * 0.4 + 1) * 1);
  c.restore();
}

function drawCrocodylomorph(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  // Slithering walk
  const slither = Math.sin(t * 0.2) * 1.5;
  c.translate(0, slither);
  // Long tail
  c.fillStyle = '#4a6a3a';
  c.beginPath();
  c.moveTo(-12, 0);
  c.quadraticCurveTo(-22, -2 + slither, -28, 2 + slither);
  c.lineTo(-30, 4 + slither);
  c.quadraticCurveTo(-22, 2 + slither, -12, 3);
  c.closePath(); c.fill();
  // Tail scutes
  c.fillStyle = '#2a4828';
  for (let i = 0; i < 4; i++) {
    c.beginPath();
    c.moveTo(-14 - i * 4, -2 + slither * 0.3);
    c.lineTo(-12 - i * 4, -4 + slither * 0.3);
    c.lineTo(-10 - i * 4, -2 + slither * 0.3);
    c.closePath(); c.fill();
  }
  // Body
  c.fillStyle = '#5a7a48';
  c.beginPath(); c.ellipse(-2, 0, 12, 4, 0, 0, Math.PI*2); c.fill();
  // Lighter belly
  c.fillStyle = '#a8c890';
  c.beginPath(); c.ellipse(-2, 3, 10, 1.5, 0, 0, Math.PI*2); c.fill();
  // Back scute row
  c.fillStyle = '#2a4828';
  for (let i = 0; i < 5; i++) {
    c.beginPath();
    c.moveTo(-8 + i * 3, -3);
    c.lineTo(-7 + i * 3, -5);
    c.lineTo(-6 + i * 3, -3);
    c.closePath(); c.fill();
  }
  // Head (small triangular crocodilian)
  c.fillStyle = '#5a7a48';
  c.beginPath(); c.ellipse(10, 0, 6, 3, 0, 0, Math.PI*2); c.fill();
  // Snout
  c.fillStyle = '#4a6a3a';
  c.beginPath();
  c.moveTo(13, -1); c.lineTo(18, 0); c.lineTo(13, 2);
  c.closePath(); c.fill();
  // Tiny teeth
  c.fillStyle = 'white';
  c.fillRect(15, 0.5, 0.5, 1);
  c.fillRect(16, 0.5, 0.5, 1);
  c.fillRect(15, -0.5, 0.5, 0.8);
  // Eye
  c.fillStyle = '#ffcc44';
  c.beginPath(); c.arc(10, -2, 1.2, 0, Math.PI*2); c.fill();
  c.fillStyle = 'black';
  c.beginPath(); c.ellipse(10, -2, 0.3, 0.9, 0, 0, Math.PI*2); c.fill();
  // Four short legs
  c.fillStyle = '#3a5828';
  c.fillRect(-6, 3, 2, 3);
  c.fillRect(-1, 3, 2, 3);
  c.fillRect(4, 3, 2, 3);
  c.restore();
}

function drawBabyTitanosaur(c, item, t) {
  c.save(); c.translate(item.x, item.y);
  // Toddling waddle
  const waddle = Math.sin(t * 0.18) * 1.5;
  c.translate(0, -Math.abs(waddle));
  // Tail
  c.fillStyle = '#9a7858';
  c.beginPath();
  c.moveTo(-10, 0);
  c.quadraticCurveTo(-18, -2 + waddle, -22, 1 + waddle);
  c.lineTo(-22, 3 + waddle);
  c.quadraticCurveTo(-18, 1 + waddle, -10, 3);
  c.closePath(); c.fill();
  // Body (chubby baby proportions)
  c.beginPath(); c.ellipse(-2, 0, 11, 7, 0, 0, Math.PI*2); c.fill();
  // Belly lighter
  c.fillStyle = '#c8ac88';
  c.beginPath(); c.ellipse(-2, 4, 9, 2.5, 0, 0, Math.PI*2); c.fill();
  // Subtle skin pattern (titanosaur osteoderms)
  c.fillStyle = '#7a5840';
  for (let i = 0; i < 4; i++) {
    c.beginPath();
    c.arc(-7 + i * 4, -3, 1, 0, Math.PI*2); c.fill();
  }
  // Long neck (proportionally short for a baby but still long)
  c.fillStyle = '#9a7858';
  c.beginPath();
  c.moveTo(8, -2);
  c.bezierCurveTo(12, -10, 16, -14, 18, -16);
  c.lineTo(20, -14);
  c.bezierCurveTo(15, -12, 12, -8, 9, -1);
  c.closePath(); c.fill();
  // Tiny head
  c.fillStyle = '#9a7858';
  c.beginPath(); c.ellipse(20, -16, 4, 3, 0.1, 0, Math.PI*2); c.fill();
  // Eye
  c.fillStyle = 'black';
  c.beginPath(); c.arc(21, -17, 0.8, 0, Math.PI*2); c.fill();
  c.fillStyle = 'white';
  c.beginPath(); c.arc(21.3, -17.3, 0.3, 0, Math.PI*2); c.fill();
  // Tiny mouth line
  c.strokeStyle = '#5a3a20'; c.lineWidth = 0.5;
  c.beginPath(); c.moveTo(22, -15); c.lineTo(24, -15); c.stroke();
  // Four stubby legs
  c.fillStyle = '#7a5840';
  c.fillRect(-7, 5, 2.5, 5 + waddle);
  c.fillRect(-2, 5, 2.5, 5 - waddle);
  c.fillRect(3, 5, 2.5, 5 + waddle);
  c.fillRect(7, 5, 2.5, 5 - waddle);
  c.restore();
}
